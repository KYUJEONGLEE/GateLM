name: deploy-production

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: gatelm-production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy approved main SHA
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 135
    environment:
      name: production
      url: https://gatelm.co.kr
    env:
      DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      AWS_EDGE_INSTANCE_ID: ${{ vars.AWS_EDGE_INSTANCE_ID }}
      AWS_GATEWAY_INSTANCE_ID: ${{ vars.AWS_GATEWAY_INSTANCE_ID }}
      AWS_DATA_INSTANCE_ID: ${{ vars.AWS_DATA_INSTANCE_ID }}
      AWS_AI_INSTANCE_ID: ${{ vars.AWS_AI_INSTANCE_ID }}
      GATELM_PUBLIC_URL: ${{ vars.GATELM_PUBLIC_URL }}
      GATELM_CHAT_URL: ${{ vars.GATELM_CHAT_URL }}

    steps:
      - name: Checkout deployment SHA
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Verify exact current main SHA and deployment variables
        shell: bash
        run: |
          set -euo pipefail
          [[ "$DEPLOY_SHA" =~ ^[0-9a-f]{40}$ ]]
          : "${AWS_REGION:?AWS_REGION production variable is required}"
          : "${AWS_ROLE_ARN:?AWS_ROLE_ARN production variable is required}"
          : "${AWS_EDGE_INSTANCE_ID:?AWS_EDGE_INSTANCE_ID production variable is required}"
          : "${AWS_GATEWAY_INSTANCE_ID:?AWS_GATEWAY_INSTANCE_ID production variable is required}"
          : "${AWS_DATA_INSTANCE_ID:?AWS_DATA_INSTANCE_ID production variable is required}"
          : "${AWS_AI_INSTANCE_ID:?AWS_AI_INSTANCE_ID production variable is required}"
          : "${GATELM_PUBLIC_URL:?GATELM_PUBLIC_URL production variable is required}"
          : "${GATELM_CHAT_URL:?GATELM_CHAT_URL production variable is required}"
          git fetch --no-tags origin main
          current_main_sha="$(git rev-parse origin/main)"
          if [[ "$DEPLOY_SHA" != "$current_main_sha" ]]; then
            echo "Refusing stale deployment: requested=$DEPLOY_SHA current_main=$current_main_sha" >&2
            exit 1
          fi

      - name: Require successful CI and Security runs for deployment SHA
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          wait_for_workflow() {
            local workflow="$1"
            local label="$2"
            local response=""
            local run=""
            local status=""
            local conclusion=""

            for attempt in $(seq 1 90); do
              response="$(gh api --method GET \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs" \
                -f branch=main \
                -f event=push \
                -f head_sha="$DEPLOY_SHA" \
                -F per_page=10)"
              run="$(jq -c --arg sha "$DEPLOY_SHA" \
                '[.workflow_runs[] | select(.head_sha == $sha)] | sort_by(.run_number) | last // empty' \
                <<<"$response")"

              if [[ -z "$run" ]]; then
                echo "Waiting for $label run for $DEPLOY_SHA ($attempt/90)."
                sleep 10
                continue
              fi

              status="$(jq -r '.status' <<<"$run")"
              conclusion="$(jq -r '.conclusion // ""' <<<"$run")"
              if [[ "$status" != "completed" ]]; then
                echo "Waiting for $label run to complete ($status, $attempt/90)."
                sleep 10
                continue
              fi
              if [[ "$conclusion" != "success" ]]; then
                echo "$label run for $DEPLOY_SHA concluded with $conclusion." >&2
                exit 1
              fi

              echo "$label run succeeded for $DEPLOY_SHA."
              return 0
            done

            echo "Timed out waiting for $label run for $DEPLOY_SHA." >&2
            exit 1
          }

          wait_for_workflow ci.yml CI
          wait_for_workflow security.yml Security

      - name: Verify authenticated smoke secrets are configured
        env:
          TENANT_CHAT_SMOKE_EMAIL: ${{ secrets.TENANT_CHAT_SMOKE_EMAIL }}
          TENANT_CHAT_SMOKE_PASSWORD: ${{ secrets.TENANT_CHAT_SMOKE_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          : "${TENANT_CHAT_SMOKE_EMAIL:?TENANT_CHAT_SMOKE_EMAIL production secret is required}"
          : "${TENANT_CHAT_SMOKE_PASSWORD:?TENANT_CHAT_SMOKE_PASSWORD production secret is required}"

      - name: Configure temporary AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: gatelm-production-${{ github.run_id }}
          role-duration-seconds: 10800

      - name: Deploy through AWS Systems Manager
        id: distributed-deploy
        shell: bash
        run: |
          set -euo pipefail
          bash deploy/aws-triage/scripts/send-ssm-deploy-distributed.sh \
            "$AWS_EDGE_INSTANCE_ID" \
            "$AWS_GATEWAY_INSTANCE_ID" \
            "$AWS_DATA_INSTANCE_ID" \
            "$AWS_AI_INSTANCE_ID" \
            "$DEPLOY_SHA" \
            "$GATELM_PUBLIC_URL" \
            "$GATELM_CHAT_URL"

      - name: Verify public authentication boundaries
        shell: bash
        run: |
          set -euo pipefail
          curl --connect-timeout 5 --max-time 30 -fsS -o /dev/null "$GATELM_PUBLIC_URL"
          curl --connect-timeout 5 --max-time 30 -fsS -o /dev/null "$GATELM_CHAT_URL/login"

          gateway_status="$(curl --connect-timeout 5 --max-time 30 -sS -o /dev/null -w '%{http_code}' \
            -X POST "$GATELM_PUBLIC_URL/v1/chat/completions" \
            -H 'Content-Type: application/json' \
            --data '{"model":"deployment-check","messages":[{"role":"user","content":"authentication-boundary-check"}]}')"
          [[ "$gateway_status" == "401" ]]

          chat_status="$(curl --connect-timeout 5 --max-time 30 -sS -o /dev/null -w '%{http_code}' \
            "$GATELM_CHAT_URL/api/tenant-chat/auth/session")"
          [[ "$chat_status" == "401" ]]

      - name: Verify authenticated Tenant Chat execution
        env:
          TENANT_CHAT_SMOKE_EMAIL: ${{ secrets.TENANT_CHAT_SMOKE_EMAIL }}
          TENANT_CHAT_SMOKE_ORIGIN: ${{ env.GATELM_CHAT_URL }}
          TENANT_CHAT_SMOKE_PASSWORD: ${{ secrets.TENANT_CHAT_SMOKE_PASSWORD }}
        run: node scripts/smoke/tenant-chat-production.mjs

      - name: Roll back distributed application roles after failed smoke
        if: ${{ failure() && steps.distributed-deploy.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          bash deploy/aws-triage/scripts/send-ssm-deploy-distributed.sh \
            "$AWS_EDGE_INSTANCE_ID" \
            "$AWS_GATEWAY_INSTANCE_ID" \
            "$AWS_DATA_INSTANCE_ID" \
            "$AWS_AI_INSTANCE_ID" \
            "$DEPLOY_SHA" \
            "$GATELM_PUBLIC_URL" \
            "$GATELM_CHAT_URL" \
            rollback
