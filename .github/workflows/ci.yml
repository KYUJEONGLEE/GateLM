name: ci

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  repo-check:
    name: repository sanity check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        shell: bash
        run: |
          set -e
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Verify v2 documents
        run: pnpm verify:v2-docs

      - name: Block committed secret files
        shell: bash
        run: |
          set -e

          if find . \
            \( -name ".env" \
            -o -name ".env.*" \
            -o -name "*.pem" \
            -o -name "*.key" \
            -o -name "*.p12" \
            -o -name "*.pfx" \
            -o -name "credentials.json" \
            -o -name "service-account.json" \) \
            -not -name ".env.example" | grep -q .; then
              echo "Secret-like file is committed. Remove it before merging."
              exit 1
          fi

          echo "Repository sanity check passed."
