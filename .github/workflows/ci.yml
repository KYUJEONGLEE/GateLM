name: ci

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repo-check:
    name: repository sanity check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Setup workflow linter Go runtime
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.12
          cache: false

      - name: Check changed files for whitespace errors
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            diff_base="$(git merge-base "$base_sha" "$head_sha")"
          else
            diff_base="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
            if [[ "$diff_base" =~ ^0+$ ]]; then
              diff_base="$(git hash-object -t tree /dev/null)"
            fi
          fi

          git diff --check "$diff_base" "$head_sha"

      - name: Verify current documentation
        run: pnpm verify:v2-docs

      - name: Validate GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Block committed secret files
        shell: bash
        run: |
          set -euo pipefail

          if find . \
            \( -name ".env" \
            -o -name ".env.*" \
            -o -name "*.pem" \
            -o -name "*.key" \
            -o -name "*.p12" \
            -o -name "*.pfx" \
            -o -name "credentials.json" \
            -o -name "service-account.json" \) \
            -not -name ".env.example" | grep -q .; then
              echo "Secret-like file is committed. Remove it before merging."
              exit 1
          fi

          echo "Repository sanity check passed."

      - name: Verify production deployment automation
        shell: bash
        run: bash deploy/aws-triage/scripts/tests/deploy-main-test.sh

  repository-contracts:
    name: repository and routing contracts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/gateway-core/go.mod
          cache-dependency-path: apps/gateway-core/go.sum

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/routing_difficulty_model/test-requirements.lock.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --requirement scripts/routing_difficulty_model/test-requirements.lock.txt
          pnpm install --frozen-lockfile

      - name: Verify repository and routing contracts
        shell: bash
        run: |
          set -euo pipefail
          pnpm verify:v2-final
          pnpm verify:routing-contract
          pnpm verify:v2.1-category-eval
          pnpm verify:v2.1-difficulty-eval

  application-verification:
    name: application verification (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target:
          - operator-web
          - tenant-chat-api
          - tenant-chat-web
          - legacy-application

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client for Tenant Chat API
        if: matrix.target == 'tenant-chat-api'
        run: pnpm --filter @gatelm/control-plane-api db:generate

      - name: Verify application
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.target }}" in
            operator-web)
              pnpm --filter @gatelm/web lint
              pnpm --filter @gatelm/web build
              ;;
            tenant-chat-api)
              pnpm --filter @gatelm/chat-api typecheck
              pnpm --filter @gatelm/chat-api test -- --runInBand
              pnpm --filter @gatelm/chat-api build
              ;;
            tenant-chat-web)
              pnpm --filter @gatelm/chat-web lint
              pnpm --filter @gatelm/chat-web test
              pnpm --filter @gatelm/chat-web typecheck
              pnpm --filter @gatelm/chat-web build
              ;;
            legacy-application)
              pnpm --filter @gatelm/application lint
              pnpm --filter @gatelm/application typecheck
              pnpm --filter @gatelm/application build
              ;;
            *)
              echo "Unknown application verification target: ${{ matrix.target }}" >&2
              exit 1
              ;;
          esac

  gateway-race:
    name: gateway race and vet
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/gateway-core/go.mod
          cache-dependency-path: apps/gateway-core/go.sum

      - name: Run Go vet
        working-directory: apps/gateway-core
        run: go vet ./...

      - name: Run race detector
        working-directory: apps/gateway-core
        env:
          CGO_ENABLED: "1"
        run: go test -race ./...

  service-integration:
    name: PostgreSQL and Redis integration
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gatelm
          POSTGRES_PASSWORD: gatelm
          POSTGRES_DB: gatelm_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gatelm -d gatelm_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://gatelm:gatelm@localhost:5432/gatelm_ci?schema=public
      TEST_DATABASE_URL: postgresql://gatelm:gatelm@localhost:5432/gatelm_ci
      GATELM_TEST_DATABASE_URL: postgresql://gatelm:gatelm@localhost:5432/gatelm_ci
      GATELM_TEST_REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/gateway-core/go.mod
          cache-dependency-path: apps/gateway-core/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate and deploy all Prisma migrations
        shell: bash
        run: |
          set -euo pipefail
          pnpm --filter @gatelm/control-plane-api exec prisma validate
          pnpm --filter @gatelm/control-plane-api exec prisma migrate deploy

      - name: Run Control Plane database integration tests
        run: pnpm --filter @gatelm/control-plane-api test -- --runInBand

      - name: Run Gateway PostgreSQL and Redis integration tests
        working-directory: apps/gateway-core
        run: >-
          go test -count=1
          ./internal/adapters/employeepolicy/postgres
          ./internal/adapters/employeepolicy/redis
          ./internal/adapters/tenantchat/admission/postgres
          ./internal/adapters/tenantchat/usage/postgres
          ./internal/services/projectapplication/employeecost

  tenant-chat-smoke:
    name: Tenant Chat container smoke
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/gateway-core/go.mod
          cache-dependency-path: apps/gateway-core/go.sum

      - name: Validate production deployment manifests
        shell: bash
        run: |
          set -euo pipefail
          docker compose \
            --env-file deploy/aws-triage/.env.example \
            -f deploy/aws-triage/docker-compose.yml \
            config --quiet
          docker compose \
            --env-file deploy/selfhost/.env.example \
            -f deploy/selfhost/docker-compose.yml \
            config --quiet

      - name: Prepare local-only Tenant Chat test secrets
        shell: bash
        run: |
          set -euo pipefail
          node scripts/dev/generate-tenant-chat-local-secrets.mjs
          find .secrets/tenant-chat -type f -exec chmod 0444 {} +

      - name: Run encrypted Tenant Chat and usage smoke with mock provider
        shell: pwsh
        run: |
          try {
            ./scripts/dev/tenant-chat-encrypted-conversation-smoke.ps1
          } catch {
            docker compose -f docker-compose.yml -f scripts/dev/docker-compose.tenant-chat-execution.yml ps --all
            docker compose -f docker-compose.yml -f scripts/dev/docker-compose.tenant-chat-execution.yml logs --no-color control-plane-api gateway-core chat-api mock-provider
            throw
          }

      - name: Build remaining production images
        shell: bash
        run: |
          set -euo pipefail
          docker compose \
            --env-file deploy/aws-triage/.env.example \
            -f deploy/aws-triage/docker-compose.yml \
            build ai-service chat-web web

  release-packaging:
    name: release packaging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [repo-check, repository-contracts, application-verification, gateway-race, service-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate deployment manifests
        shell: bash
        run: |
          set -euo pipefail
          docker compose \
            --env-file deploy/aws-triage/.env.example \
            -f deploy/aws-triage/docker-compose.yml \
            config --quiet
          docker compose \
            --env-file deploy/selfhost/.env.example \
            -f deploy/selfhost/docker-compose.yml \
            config --quiet

      - name: Build release images
        shell: bash
        run: |
          set -euo pipefail
          docker compose \
            --env-file deploy/aws-triage/.env.example \
            -f deploy/aws-triage/docker-compose.yml \
            build \
            control-plane-api \
            gateway-core \
            ai-service \
            chat-api \
            chat-web \
            web
