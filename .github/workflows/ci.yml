name: ci

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  repo-check:
    name: repository sanity check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Check changed files for whitespace errors
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            diff_base="$(git merge-base "$base_sha" "$head_sha")"
          else
            diff_base="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
            if [[ "$diff_base" =~ ^0+$ ]]; then
              diff_base="$(git hash-object -t tree /dev/null)"
            fi
          fi

          git diff --check "$diff_base" "$head_sha"

      - name: Verify current documentation
        run: pnpm verify:v2-docs

      - name: Block committed secret files
        shell: bash
        run: |
          set -euo pipefail

          if find . \
            \( -name ".env" \
            -o -name ".env.*" \
            -o -name "*.pem" \
            -o -name "*.key" \
            -o -name "*.p12" \
            -o -name "*.pfx" \
            -o -name "credentials.json" \
            -o -name "service-account.json" \) \
            -not -name ".env.example" | grep -q .; then
              echo "Secret-like file is committed. Remove it before merging."
              exit 1
          fi

          echo "Repository sanity check passed."

      - name: Verify production deployment automation
        shell: bash
        run: bash deploy/aws-triage/scripts/tests/deploy-main-test.sh

  application-verification:
    name: application verification
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/gateway-core/go.mod
          cache-dependency-path: apps/gateway-core/go.sum

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/routing_difficulty_model/test-requirements.lock.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --requirement scripts/routing_difficulty_model/test-requirements.lock.txt
          pnpm install --frozen-lockfile

      - name: Verify repository and routing contracts
        shell: bash
        run: |
          set -euo pipefail
          pnpm verify:v2-final
          pnpm verify:routing-contract
          pnpm verify:v2.1-category-eval
          pnpm verify:v2.1-difficulty-eval

      - name: Verify operator web
        shell: bash
        run: |
          set -euo pipefail
          pnpm --filter @gatelm/web lint
          pnpm --filter @gatelm/web build

      - name: Verify Tenant Chat API
        shell: bash
        run: |
          set -euo pipefail
          pnpm --filter @gatelm/chat-api typecheck
          pnpm --filter @gatelm/chat-api test -- --runInBand
          pnpm --filter @gatelm/chat-api build

      - name: Verify Tenant Chat web
        shell: bash
        run: |
          set -euo pipefail
          pnpm --filter @gatelm/chat-web lint
          pnpm --filter @gatelm/chat-web test
          pnpm --filter @gatelm/chat-web typecheck
          pnpm --filter @gatelm/chat-web build

      - name: Verify legacy application
        shell: bash
        run: |
          set -euo pipefail
          pnpm --filter @gatelm/application lint
          pnpm --filter @gatelm/application typecheck
          pnpm --filter @gatelm/application build

  gateway-race:
    name: gateway race and vet
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/gateway-core/go.mod
          cache-dependency-path: apps/gateway-core/go.sum

      - name: Run Go vet
        working-directory: apps/gateway-core
        run: go vet ./...

      - name: Run race detector
        working-directory: apps/gateway-core
        env:
          CGO_ENABLED: "1"
        run: go test -race ./...

  release-packaging:
    name: release packaging
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    needs: [repo-check, application-verification, gateway-race]
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate deployment manifests
        shell: bash
        run: |
          set -euo pipefail
          docker compose \
            --env-file deploy/aws-triage/.env.example \
            -f deploy/aws-triage/docker-compose.yml \
            config --quiet
          docker compose \
            --env-file deploy/selfhost/.env.example \
            -f deploy/selfhost/docker-compose.yml \
            config --quiet

      - name: Build release images
        shell: bash
        run: |
          set -euo pipefail
          docker compose \
            --env-file deploy/aws-triage/.env.example \
            -f deploy/aws-triage/docker-compose.yml \
            build \
            control-plane-api \
            gateway-core \
            ai-service \
            chat-api \
            chat-web \
            web
