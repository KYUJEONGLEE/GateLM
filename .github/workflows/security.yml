name: security

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  schedule:
    - cron: "17 2 * * 1"

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    name: dependency review
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Detect Dependency Graph support
        id: dependency-graph
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          readonly max_attempts=5
          status=""

          for ((attempt = 1; attempt <= max_attempts; attempt += 1)); do
            if status="$(
              gh api "repos/${GITHUB_REPOSITORY}" \
                --jq '.security_and_analysis.dependency_graph.status // "disabled"' \
                2>/dev/null
            )"; then
              break
            fi

            if ((attempt == max_attempts)); then
              echo "::error::Unable to determine Dependency Graph support after ${max_attempts} attempts."
              exit 1
            fi

            retry_delay_seconds=$((attempt * 2))
            echo "::warning::Dependency Graph support probe failed; retrying in ${retry_delay_seconds}s (${attempt}/${max_attempts})."
            sleep "${retry_delay_seconds}"
          done

          case "${status}" in
            enabled)
              echo "enabled=true" >> "${GITHUB_OUTPUT}"
              ;;
            disabled)
              echo "enabled=false" >> "${GITHUB_OUTPUT}"
              echo "::warning::Dependency Review skipped because GitHub Dependency Graph is not enabled for this repository."
              ;;
            *)
              echo "::error::Dependency Graph support probe returned an unexpected status."
              exit 1
              ;;
          esac

      - name: Reject newly introduced vulnerable dependencies
        if: steps.dependency-graph.outputs.enabled == 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  go-vulnerability:
    name: Go vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/gateway-core/go.mod
          cache-dependency-path: apps/gateway-core/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.2

      - name: Scan Gateway dependencies and reachable symbols
        continue-on-error: true
        working-directory: apps/gateway-core
        run: govulncheck ./...

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Autobuild compiled language
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  security-gate:
    name: Security gate
    if: always()
    needs:
      - dependency-review
      - go-vulnerability
      - codeql
    runs-on: ubuntu-latest

    steps:
      - name: Require security verification jobs
        env:
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
          GO_VULNERABILITY_RESULT: ${{ needs.go-vulnerability.result }}
          CODEQL_RESULT: ${{ needs.codeql.result }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$DEPENDENCY_REVIEW_RESULT" != "success" && "$DEPENDENCY_REVIEW_RESULT" != "skipped" ]]; then
            echo "Dependency review did not succeed: $DEPENDENCY_REVIEW_RESULT" >&2
            exit 1
          fi
          for result in "$GO_VULNERABILITY_RESULT" "$CODEQL_RESULT"; do
            if [[ "$result" != "success" ]]; then
              echo "Required security job did not succeed: $result" >&2
              exit 1
            fi
          done
