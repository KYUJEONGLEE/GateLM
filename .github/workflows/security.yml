name: security

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  schedule:
    - cron: "17 2 * * 1"

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    name: dependency review
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Reject newly introduced vulnerable dependencies
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  go-vulnerability:
    name: Go vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/gateway-core/go.mod
          cache-dependency-path: apps/gateway-core/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.2

      - name: Scan Gateway dependencies and reachable symbols
        continue-on-error: true
        working-directory: apps/gateway-core
        run: govulncheck ./...

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Autobuild compiled language
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
