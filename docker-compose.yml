name: gatelm

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gatelm
      POSTGRES_PASSWORD: gatelm
      POSTGRES_DB: gatelm
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatelm -d gatelm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mock-provider:
    image: python:3.12-alpine
    environment:
      MOCK_PROVIDER_PORT: ${MOCK_PROVIDER_PORT:-8090}
      MOCK_PROVIDER_DEFAULT_LATENCY_MS: ${MOCK_PROVIDER_DEFAULT_LATENCY_MS:-150}
      MOCK_PROVIDER_ERROR_MODE: ${MOCK_PROVIDER_ERROR_MODE:-off}
      MOCK_PROVIDER_STATS_HASH_SECRET: ${MOCK_PROVIDER_STATS_HASH_SECRET:-mock_provider_stats_hash_secret_for_p0_demo_only}
    command:
      - python
      - -c
      - |
        import hashlib, hmac, json, os, re, time
        from http.server import BaseHTTPRequestHandler, HTTPServer

        port = int(os.getenv("MOCK_PROVIDER_PORT", "8090"))
        latency_ms = int(os.getenv("MOCK_PROVIDER_DEFAULT_LATENCY_MS", "150"))
        initial_error_mode = os.getenv("MOCK_PROVIDER_ERROR_MODE", "off").strip().lower()
        if initial_error_mode not in ["off", "error", "timeout"]:
            initial_error_mode = "off"
        stats_hash_secret = os.getenv("MOCK_PROVIDER_STATS_HASH_SECRET", "mock_provider_stats_hash_secret_for_p0_demo_only").encode("utf-8")
        raw_sensitive_patterns = [
            re.compile(r"(?i)\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}\b"),
            re.compile(r"\b(?:\+82[-.\s]?)?0?1[016789][-.\s]?\d{3,4}[-.\s]?\d{4}\b"),
            re.compile(r"\b\d{6}-[1-4]\d{6}\b"),
            re.compile(r"\beyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\b"),
            re.compile(r"(?i)\b(api[_-]?key|secret|token|access[_-]?key|client[_-]?secret)\s*[:=]\s*['\"]?[A-Za-z0-9_\-.]{20,}"),
        ]
        state = {
            "calls": 0,
            "config": {"mode": initial_error_mode, "failModels": []},
            "data": {"totalCalls": 0, "callsByModel": {}, "lastCalls": []}
        }

        def reset_state():
            state["calls"] = 0
            state["data"]["totalCalls"] = 0
            state["data"]["callsByModel"] = {}
            state["data"]["lastCalls"] = []

        def configure_failure(payload):
            if not isinstance(payload, dict):
                return False
            mode = str(payload.get("mode", "off")).strip().lower()
            if mode not in ["off", "error", "timeout"]:
                return False
            fail_models = payload.get("failModels") or []
            if not isinstance(fail_models, list):
                return False
            state["config"] = {
                "mode": mode,
                "failModels": [str(model).strip() for model in fail_models if str(model).strip()]
            }
            return True

        def should_fail_model(model):
            config = state.get("config", {})
            mode = config.get("mode", "off")
            if mode == "off":
                return False
            fail_models = config.get("failModels") or []
            model_name = str(model).strip()
            return not fail_models or model_name in fail_models

        def prompt_hash(prompt):
            digest = hmac.new(stats_hash_secret, prompt.encode("utf-8"), hashlib.sha256).hexdigest()
            return "hmac-sha256:" + digest

        def redacted_preview_for_stats(prompt):
            preview = prompt[:120]
            for pattern in raw_sensitive_patterns:
                if pattern.search(preview):
                    return "[UNREDACTED_PROVIDER_INPUT_BLOCKED_FROM_STATS]"
            return preview

        def record_call(request_id, model, prompt):
            state["calls"] += 1
            data = state["data"]
            data["totalCalls"] = state["calls"]
            data["callsByModel"][model] = data["callsByModel"].get(model, 0) + 1
            data["lastCalls"].append({
                "requestId": request_id,
                "model": model,
                "promptHash": prompt_hash(prompt),
                "redactedPromptPreview": redacted_preview_for_stats(prompt),
                "createdAt": time.strftime("%Y-%m-%dT%H:%M:%S.000Z", time.gmtime()),
            })
            data["lastCalls"] = data["lastCalls"][-20:]

        def stream_chunks(model):
            created = int(time.time())
            return [
                {
                    "id": "mock_chatcmpl_stream_local",
                    "object": "chat.completion.chunk",
                    "created": created,
                    "model": model,
                    "choices": [{"index": 0, "delta": {"role": "assistant"}, "finish_reason": None}],
                },
                {
                    "id": "mock_chatcmpl_stream_local",
                    "object": "chat.completion.chunk",
                    "created": created,
                    "model": model,
                    "choices": [{"index": 0, "delta": {"content": "GateLM mock streaming 응답입니다. "}, "finish_reason": None}],
                },
                {
                    "id": "mock_chatcmpl_stream_local",
                    "object": "chat.completion.chunk",
                    "created": created,
                    "model": model,
                    "choices": [{"index": 0, "delta": {"content": "실제 Provider 비용 없이 SSE relay를 확인합니다."}, "finish_reason": None}],
                },
                {
                    "id": "mock_chatcmpl_stream_local",
                    "object": "chat.completion.chunk",
                    "created": created,
                    "model": model,
                    "choices": [{"index": 0, "delta": {}, "finish_reason": "stop"}],
                    "usage": {"prompt_tokens": 32, "completion_tokens": 24, "total_tokens": 56},
                },
            ]

        class Handler(BaseHTTPRequestHandler):
            def send_json(self, status, payload):
                body = json.dumps(payload).encode("utf-8")
                self.send_response(status)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)

            def send_stream(self, model):
                self.send_response(200)
                self.send_header("Content-Type", "text/event-stream; charset=utf-8")
                self.send_header("Cache-Control", "no-cache")
                self.send_header("Connection", "keep-alive")
                self.send_header("X-Accel-Buffering", "no")
                self.end_headers()
                for chunk in stream_chunks(model):
                    data = json.dumps(chunk, ensure_ascii=False)
                    self.wfile.write(("data: " + data + "\n\n").encode("utf-8"))
                    self.wfile.flush()
                    time.sleep(0.02)
                self.wfile.write(b"data: [DONE]\n\n")
                self.wfile.flush()

            def do_GET(self):
                if self.path == "/healthz":
                    self.send_json(200, {"status": "ok"})
                    return
                if self.path == "/v1/models":
                    self.send_json(200, {"object": "list", "data": [
                        {"id": "mock-fast", "object": "model", "owned_by": "mock"},
                        {"id": "mock-balanced", "object": "model", "owned_by": "mock"},
                        {"id": "mock-smart", "object": "model", "owned_by": "mock"}
                    ]})
                    return
                if self.path == "/__mock/stats":
                    self.send_json(200, state)
                    return
                self.send_json(404, {"error": {"code": "not_found"}})

            def do_POST(self):
                length = int(self.headers.get("Content-Length", "0"))
                raw = self.rfile.read(length) if length else b"{}"
                try:
                    payload = json.loads(raw.decode("utf-8"))
                except Exception:
                    payload = {}
                if self.path == "/__mock/reset":
                    reset_state()
                    self.send_json(200, {"ok": True})
                    return
                if self.path == "/__mock/config":
                    if not configure_failure(payload):
                        self.send_json(400, {"error": {"code": "invalid_mock_config"}})
                        return
                    self.send_json(200, {"ok": True})
                    return
                if self.path == "/v1/chat/completions":
                    if not isinstance(payload, dict):
                        self.send_json(400, {"error": {"code": "invalid_request"}})
                        return
                    time.sleep(latency_ms / 1000)
                    model = str(payload.get("model") or "mock-balanced").strip() or "mock-balanced"
                    messages = payload.get("messages") or []
                    prompt = " ".join(str(m.get("content", "")) for m in messages if isinstance(m, dict))
                    if should_fail_model(model):
                        mode = state["config"]["mode"]
                        status = 504 if mode == "timeout" else 500
                        code = "provider_timeout" if mode == "timeout" else "provider_error"
                        self.send_json(status, {"error": {"code": code, "message": "Synthetic provider failure for GateLM evidence."}})
                        return
                    record_call(self.headers.get("X-GateLM-Request-Id", ""), model, prompt)
                    if payload.get("stream") is True:
                        self.send_stream(model)
                        return
                    self.send_json(200, {
                        "id": "mock_chatcmpl_local",
                        "object": "chat.completion",
                        "created": int(time.time()),
                        "model": model,
                        "choices": [{"index": 0, "message": {"role": "assistant", "content": "Mock response for: " + prompt[:120]}, "finish_reason": "stop"}],
                        "usage": {"prompt_tokens": 32, "completion_tokens": 24, "total_tokens": 56}
                    })
                    return
                self.send_json(404, {"error": {"code": "not_found"}})

        HTTPServer(("0.0.0.0", port), Handler).serve_forever()
    ports:
      - "${MOCK_PROVIDER_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8090/healthz', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.55.1

    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-24h}
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  grafana:
    image: grafana/grafana:11.3.0
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
  node-toolbox:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: infra/docker/node/Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-22}
        PNPM_VERSION: ${PNPM_VERSION:-9.15.0}
    environment:
      CONTROL_PLANE_PORT: ${CONTROL_PLANE_PORT:-3001}
      DATABASE_URL: postgresql://gatelm:gatelm@postgres:5432/gatelm?schema=public
      REDIS_URL: redis://redis:6379
      CONTROL_PLANE_ADMIN_AUTH_MODE: ${CONTROL_PLANE_ADMIN_AUTH_MODE:-demo_admin_placeholder}
      CONTROL_PLANE_PROVIDER_CREDENTIAL_ENV_MAP: ${CONTROL_PLANE_PROVIDER_CREDENTIAL_ENV_MAP:-}
      GATEWAY_PROVIDER_CREDENTIAL_ENV_MAP: ${GATEWAY_PROVIDER_CREDENTIAL_ENV_MAP:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "${CONTROL_PLANE_PORT:-3001}:${CONTROL_PLANE_PORT:-3001}"
    working_dir: /workspace
    volumes:
      - .:/workspace
      - node_pnpm_store:/pnpm/store
    command: ["bash"]

  go-toolbox:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: infra/docker/go/Dockerfile
      args:
        GO_VERSION: ${GO_VERSION:-1.24}
    environment:
      GATEWAY_PORT: ${GATEWAY_PORT:-8080}
      GATEWAY_DEFAULT_PROVIDER: ${GATEWAY_DEFAULT_PROVIDER:-mock}
      GATEWAY_DEFAULT_MODEL: ${GATEWAY_DEFAULT_MODEL:-mock-balanced}
      GATEWAY_LOW_COST_MODEL: ${GATEWAY_LOW_COST_MODEL:-mock-fast}
      GATEWAY_HIGH_QUALITY_MODEL: ${GATEWAY_HIGH_QUALITY_MODEL:-mock-smart}
      GATEWAY_PROVIDER_TIMEOUT_MS: ${GATEWAY_PROVIDER_TIMEOUT_MS:-5000}
      GATEWAY_MAX_REQUEST_BODY_BYTES: ${GATEWAY_MAX_REQUEST_BODY_BYTES:-4194304}
      GATEWAY_CONTROL_PLANE_BASE_URL: ${GATEWAY_CONTROL_PLANE_BASE_URL:-http://host.docker.internal:${CONTROL_PLANE_PORT:-3001}}
      GATEWAY_CONTROL_PLANE_TIMEOUT_MS: ${GATEWAY_CONTROL_PLANE_TIMEOUT_MS:-2000}
      GATEWAY_PROVIDER_CREDENTIAL_ENV_MAP: ${GATEWAY_PROVIDER_CREDENTIAL_ENV_MAP:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DATABASE_URL: postgresql://gatelm:gatelm@postgres:5432/gatelm?schema=public
      REDIS_URL: redis://redis:6379
      MOCK_PROVIDER_BASE_URL: http://mock-provider:8090
    ports:
      - "${GATEWAY_PORT:-8080}:${GATEWAY_PORT:-8080}"
    working_dir: /workspace
    volumes:
      - .:/workspace
      - go_pkg_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    command: ["bash"]

  python-toolbox:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: infra/docker/python/Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
    working_dir: /workspace
    volumes:
      - .:/workspace
      - python_pip_cache:/root/.cache/pip
    command: ["bash"]

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  node_pnpm_store:
  go_pkg_cache:
  go_build_cache:
  python_pip_cache:
