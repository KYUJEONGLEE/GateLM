  GatewayPublicTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Port: 8080
      Protocol: TCP
      TargetType: instance
      VpcId: !Ref ProductionVpc
      HealthCheckEnabled: true
      HealthCheckIntervalSeconds: 10
      HealthCheckPath: /healthz
      HealthCheckPort: traffic-port
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 6
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
        - Key: preserve_client_ip.enabled
          Value: "true"
      Targets:
        - Id: !Ref GatewayInstance
        - Id: !Ref GatewaySecondaryInstance
      Tags:
        - Key: Name
          Value: gatelm-production-distributed-gateway-public
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed

  GatewayPrivateTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Port: 8081
      Protocol: TCP
      TargetType: instance
      VpcId: !Ref ProductionVpc
      HealthCheckEnabled: true
      HealthCheckIntervalSeconds: 10
      HealthCheckPort: traffic-port
      HealthCheckProtocol: TCP
      HealthCheckTimeoutSeconds: 6
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 3
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
        - Key: preserve_client_ip.enabled
          Value: "true"
        - Key: stickiness.enabled
          Value: "true"
        - Key: stickiness.type
          Value: source_ip
