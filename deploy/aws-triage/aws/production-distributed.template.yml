AWSTemplateFormatVersion: "2010-09-09"
Description: GateLM distributed production foundation with dual private Gateway targets and dedicated AI and PII services.

Parameters:
  SshKeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: gatelm-triage-key
    Description: Existing break-glass key pair. No inbound SSH rule is created.
  UbuntuAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id
  EdgeInstanceType:
    Type: String
    Default: c7i.large
  GatewayInstanceType:
    Type: String
    Default: c7i.xlarge
  DataInstanceType:
    Type: String
    Default: m7i.large
  AiInstanceType:
    Type: String
    Default: c7i.xlarge
    Description: Four-vCPU compute-optimized host for RAG and authoritative E5 routing inference.
  PiiInstanceType:
    Type: String
    Default: c7i.xlarge
    Description: Four-vCPU compute-optimized host for the dedicated PII ONNX runtime.
  ProductionPiiArtifactBucketName:
    Type: String
    AllowedPattern: "[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]"
    Description: Dedicated private bucket for immutable production PII model artifacts.
  ProductionRagBucketName:
    Type: String
    Description: Existing private production RAG bucket used by the Data host.
  ProductionRagKmsKeyArn:
    Type: String
    Description: Existing production RAG KMS key ARN used through S3.
  RoutingDifficultyServiceTokenParameterName:
    Type: String
    Default: /gatelm/production/routing-difficulty-service-token
    AllowedPattern: "/[A-Za-z0-9_./-]+"
    Description: SecureString parameter read by Gateway and AI hosts during deployment.

Resources:
  ProductionVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.78.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: gatelm-production-distributed-vpc
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed
        - Key: ManagedBy
          Value: CloudFormation

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: gatelm-production-distributed-igw
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref ProductionVpc

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.78.1.0/24
      MapPublicIpOnLaunch: false
      VpcId: !Ref ProductionVpc
      Tags:
        - Key: Name
          Value: gatelm-production-distributed-public
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed
        - Key: Network
          Value: public

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.78.2.0/24
      MapPublicIpOnLaunch: false
      VpcId: !Ref ProductionVpc
      Tags:
        - Key: Name
          Value: gatelm-production-distributed-private
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed
        - Key: Network
          Value: private

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ProductionVpc
      Tags:
        - Key: Name
          Value: gatelm-production-distributed-public-routes
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref PublicRouteTable

  PublicRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  NatEip:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: gatelm-production-distributed-nat
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: gatelm-production-distributed-nat
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ProductionVpc
      Tags:
        - Key: Name
          Value: gatelm-production-distributed-private-routes
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway
      RouteTableId: !Ref PrivateRouteTable

  PrivateRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet

  EdgeSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: GateLM public Edge. Only HTTP and HTTPS are exposed.
      GroupName: gatelm-production-distributed-edge
      VpcId: !Ref ProductionVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Public HTTP for Caddy redirect and certificate flow
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Public HTTPS
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Image pull, certificate issuance, and private service traffic
      Tags:
        - Key: Name
          Value: gatelm-production-distributed-edge
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed

  GatewaySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: GateLM private Gateway data plane.
      GroupName: gatelm-production-distributed-gateway
      VpcId: !Ref ProductionVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref EdgeSecurityGroup
          Description: Public Gateway API through Edge only
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Provider APIs, image pull, and private dependencies
      Tags:
        - Key: Name
          Value: gatelm-production-distributed-gateway
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed

  GatewayLoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: GateLM internal Network Load Balancer for public and private Gateway traffic.
      GroupName: gatelm-production-distributed-gateway-nlb
      VpcId: !Ref ProductionVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref EdgeSecurityGroup
          Description: Public Gateway API from Edge only
        - IpProtocol: tcp
          FromPort: 8081
          ToPort: 8081
          SourceSecurityGroupId: !Ref DataSecurityGroup
          Description: Tenant Chat and RAG workload traffic from Data only
      SecurityGroupEgress: []
      Tags:
        - Key: Name
          Value: gatelm-production-distributed-gateway-nlb
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed

  DataSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: GateLM private Control Plane, Chat API, PostgreSQL, Redis, and RAG worker.
      GroupName: gatelm-production-distributed-data
      VpcId: !Ref ProductionVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          SourceSecurityGroupId: !Ref EdgeSecurityGroup
          Description: Control Plane from Edge Web
        - IpProtocol: tcp
          FromPort: 3003
          ToPort: 3003
          SourceSecurityGroupId: !Ref EdgeSecurityGroup
          Description: Tenant Chat API from Edge
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          SourceSecurityGroupId: !Ref GatewaySecurityGroup
          Description: RuntimeSnapshot and observability from Gateway
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref GatewaySecurityGroup
          Description: PostgreSQL from Gateway
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref GatewaySecurityGroup
          Description: Redis from Gateway
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: S3, KMS, image pull, and private service traffic
      Tags:
        - Key: Name
          Value: gatelm-production-distributed-data
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed

  AiSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: GateLM private AI Service.
      GroupName: gatelm-production-distributed-ai
      VpcId: !Ref ProductionVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8001
          ToPort: 8001
          SourceSecurityGroupId: !Ref GatewaySecurityGroup
          Description: AI Safety calls from Gateway
        - IpProtocol: tcp
          FromPort: 8001
          ToPort: 8001
          SourceSecurityGroupId: !Ref DataSecurityGroup
          Description: RAG extraction calls from Data worker
        - IpProtocol: tcp
          FromPort: 8090
          ToPort: 8090
          SourceSecurityGroupId: !Ref GatewaySecurityGroup
          Description: Existing production Mock Provider from Gateway
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Image and model artifact pull through NAT
      Tags:
        - Key: Name
          Value: gatelm-production-distributed-ai
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed

  PiiSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: GateLM private dedicated PII inference service.
      GroupName: gatelm-production-distributed-pii
      VpcId: !Ref ProductionVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8001
          ToPort: 8001
          SourceSecurityGroupId: !Ref GatewaySecurityGroup
          Description: PII detection calls from Gateway only
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Private S3 artifact and image dependency access through NAT
      Tags:
        - Key: Name
          Value: gatelm-production-distributed-pii
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed

  DataPostgresSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref DataSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref DataSecurityGroup
      Description: Co-located Control Plane, Chat API, and RAG worker to PostgreSQL

  DataRedisSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref DataSecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      SourceSecurityGroupId: !Ref DataSecurityGroup
      Description: Co-located Control Plane to Redis

  GatewayPrivateIngressFromData:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref GatewaySecurityGroup
      IpProtocol: tcp
      FromPort: 8081
      ToPort: 8081
      SourceSecurityGroupId: !Ref DataSecurityGroup
      Description: Tenant Chat and RAG embedding workload calls from Data

  GatewayPublicIngressFromLoadBalancer:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref GatewaySecurityGroup
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      SourceSecurityGroupId: !Ref GatewayLoadBalancerSecurityGroup
      Description: Public Gateway API and health checks from the internal NLB

  GatewayPrivateIngressFromLoadBalancer:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref GatewaySecurityGroup
      IpProtocol: tcp
      FromPort: 8081
      ToPort: 8081
      SourceSecurityGroupId: !Ref GatewayLoadBalancerSecurityGroup
      Description: Private Tenant Chat traffic and health checks from the internal NLB

  GatewayLoadBalancerPublicEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref GatewayLoadBalancerSecurityGroup
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      DestinationSecurityGroupId: !Ref GatewaySecurityGroup
      Description: Public Gateway target and health-check traffic

  GatewayLoadBalancerPrivateEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref GatewayLoadBalancerSecurityGroup
      IpProtocol: tcp
      FromPort: 8081
      ToPort: 8081
      DestinationSecurityGroupId: !Ref GatewaySecurityGroup
      Description: Private Gateway target and health-check traffic

  GatewayBootstrapKmsKey:
    Type: AWS::KMS::Key
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Description: Encrypts short-lived GateLM Gateway bootstrap bundles in S3.
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableIamPermissions
            Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource: "*"
      Tags:
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed
        - Key: DataClass
          Value: ephemeral-secret-bootstrap

  GatewayBootstrapBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt GatewayBootstrapKmsKey.Arn
            BucketKeyEnabled: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireGatewayBootstrapBundles
            Status: Enabled
            ExpirationInDays: 1
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: gatelm-production-distributed-gateway-bootstrap
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed
        - Key: DataClass
          Value: ephemeral-secret-bootstrap

  GatewayBootstrapBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref GatewayBootstrapBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt GatewayBootstrapBucket.Arn
              - !Sub ${GatewayBootstrapBucket.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: "false"
          - Sid: RequireKmsEncryptionHeader
            Effect: Deny
            Principal: "*"
            Action: s3:PutObject
            Resource: !Sub ${GatewayBootstrapBucket.Arn}/gateway-bootstrap/*
            Condition:
              StringNotEquals:
                s3:x-amz-server-side-encryption: aws:kms
          - Sid: RequireBootstrapKmsKey
            Effect: Deny
            Principal: "*"
            Action: s3:PutObject
            Resource: !Sub ${GatewayBootstrapBucket.Arn}/gateway-bootstrap/*
            Condition:
              StringNotEquals:
                s3:x-amz-server-side-encryption-aws-kms-key-id: !GetAtt GatewayBootstrapKmsKey.Arn

  NodeRole:
    Type: AWS::IAM::Role
    Properties:
      Description: SSM management for GateLM production Edge and AI hosts.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: GateLMRoutingDifficultyTokenRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadRoutingDifficultyServiceToken
                Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${RoutingDifficultyServiceTokenParameterName}
      Tags:
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed
        - Key: Purpose
          Value: ProductionNode

  NodeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref NodeRole]

  GatewayRole:
    Type: AWS::IAM::Role
    Properties:
      Description: SSM, routing token, and ephemeral bootstrap access for GateLM Gateway hosts.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: GateLMRoutingDifficultyTokenRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadRoutingDifficultyServiceToken
                Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${RoutingDifficultyServiceTokenParameterName}
        - PolicyName: GateLMGatewayBootstrapBundleAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ListGatewayBootstrapPrefix
                Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt GatewayBootstrapBucket.Arn
                Condition:
                  StringLike:
                    s3:prefix: gateway-bootstrap/*
              - Sid: ManageGatewayBootstrapBundles
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub ${GatewayBootstrapBucket.Arn}/gateway-bootstrap/*
              - Sid: UseGatewayBootstrapKmsKeyThroughS3
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:Encrypt
                  - kms:GenerateDataKey
                  - kms:DescribeKey
                Resource: !GetAtt GatewayBootstrapKmsKey.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub s3.${AWS::Region}.amazonaws.com
                    kms:CallerAccount: !Ref AWS::AccountId
      Tags:
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed
        - Key: Purpose
          Value: ProductionGateway

  GatewayInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref GatewayRole]

  DataRole:
    Type: AWS::IAM::Role
    Properties:
      Description: SSM and production RAG object storage for the GateLM Data host.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: GateLMProductionRagObjectStorage
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ListProductionRagBucket
                Effect: Allow
                Action: s3:ListBucket
                Resource: !Sub arn:${AWS::Partition}:s3:::${ProductionRagBucketName}
              - Sid: ManageProductionRagObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub arn:${AWS::Partition}:s3:::${ProductionRagBucketName}/*
              - Sid: UseProductionRagKmsThroughS3
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource: !Ref ProductionRagKmsKeyArn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub s3.${AWS::Region}.amazonaws.com
                    kms:CallerAccount: !Ref AWS::AccountId
      Tags:
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed
        - Key: Purpose
          Value: ProductionData

  DataInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref DataRole]

  PiiArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref ProductionPiiArtifactBucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: gatelm-production-pii-artifacts
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed
        - Key: DataClass
          Value: model-artifact

  PiiRole:
    Type: AWS::IAM::Role
    Properties:
      Description: SSM and immutable PII model artifact read access for the GateLM PII host.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: GateLMProductionPiiArtifactRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadPiiArtifactBucketLocation
                Effect: Allow
                Action: s3:GetBucketLocation
                Resource: !Sub arn:${AWS::Partition}:s3:::${ProductionPiiArtifactBucketName}
              - Sid: ListPinnedPiiArtifacts
                Effect: Allow
                Action: s3:ListBucket
                Resource: !Sub arn:${AWS::Partition}:s3:::${ProductionPiiArtifactBucketName}
                Condition:
                  StringLike:
                    s3:prefix: pii/v36/*
              - Sid: ReadPinnedPiiArtifacts
                Effect: Allow
                Action: s3:GetObject
                Resource: !Sub arn:${AWS::Partition}:s3:::${ProductionPiiArtifactBucketName}/pii/v36/*
      Tags:
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed
        - Key: Purpose
          Value: ProductionPii

  PiiInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref PiiRole]

  EdgeInstance:
    Type: AWS::EC2::Instance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !GetAtt PublicSubnet.AvailabilityZone
      DisableApiTermination: true
      EbsOptimized: true
      IamInstanceProfile: !Ref NodeInstanceProfile
      ImageId: !Ref UbuntuAmiId
      InstanceInitiatedShutdownBehavior: stop
      InstanceType: !Ref EdgeInstanceType
      KeyName: !Ref SshKeyName
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
      NetworkInterfaces:
        - AssociatePublicIpAddress: false
          DeleteOnTermination: true
          DeviceIndex: "0"
          GroupSet: [!Ref EdgeSecurityGroup]
          PrivateIpAddress: 10.78.1.10
          SubnetId: !Ref PublicSubnet
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            DeleteOnTermination: false
            Encrypted: true
            Iops: 3000
            VolumeSize: 30
            VolumeType: gp3
      UserData: !Base64
        Fn::Sub: |
          #!/usr/bin/env bash
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y ca-certificates curl docker-compose-v2 docker.io git jq postgresql-client python3 unzip
          systemctl enable --now docker
          usermod -aG docker ubuntu
          install -d -o ubuntu -g ubuntu -m 0755 /home/ubuntu/GateLM
          printf '%s\n' edge > /etc/gatelm-production-role
      Tags:
        - Key: Name
          Value: gatelm-production-distributed-edge
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: production-distributed
        - Key: Role
          Value: edge
        - Key: DoNotDelete
          Value: "true"

  GatewayInstance:
    Type: AWS::EC2::Instance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !GetAtt PrivateSubnet.AvailabilityZone
      DisableApiTermination: true
      EbsOptimized: true
      IamInstanceProfile: !Ref GatewayInstanceProfile
      ImageId: !Ref UbuntuAmiId
      InstanceInitiatedShutdownBehavior: stop
      InstanceType: !Ref GatewayInstanceType
      KeyName: !Ref SshKeyName
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
      NetworkInterfaces:
        - AssociatePublicIpAddress: false
          DeleteOnTermination: true
          DeviceIndex: "0"
          GroupSet: [!Ref GatewaySecurityGroup]
          PrivateIpAddress: 10.78.2.20
          SubnetId: !Ref PrivateSubnet
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            DeleteOnTermination: false
            Encrypted: true
            Iops: 3000
            VolumeSize: 40
            VolumeType: gp3
      UserData: !Base64
        Fn::Sub: |
          #!/usr/bin/env bash
          set -euxo pipefail
