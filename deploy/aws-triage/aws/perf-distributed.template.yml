AWSTemplateFormatVersion: "2010-09-09"
Description: GateLM isolated four-host distributed performance and production-clone environment.

Parameters:
  OperatorCidr:
    Type: String
    AllowedPattern: "^(?:[0-9]{1,3}\\.){3}[0-9]{1,3}/32$"
    Description: Current trusted operator IPv4 address in /32 form for SSH only.
  EdgeIngressCidr:
    Type: String
    Default: 127.0.0.1/32
    AllowedPattern: "^(?:[0-9]{1,3}\\.){3}[0-9]{1,3}/(?:[0-9]|[12][0-9]|3[0-2])$"
    Description: HTTP and HTTPS source CIDR. Keep operator-only for rehearsal; use 0.0.0.0/0 only at production cutover.
  SshKeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 key pair that matches the operator PEM file.
  UbuntuAmiId:
    Type: AWS::EC2::Image::Id
    Default: ami-0344289fbfd3bb8f0
    Description: Pinned AMI already used by all four hosts; update only through a reviewed replacement plan.
  LoadGeneratorInstanceType:
    Type: String
    Default: c7i.xlarge
  GatewayInstanceType:
    Type: String
    Default: c7i.xlarge
  DataInstanceType:
    Type: String
    Default: m7i.large
  MockInstanceType:
    Type: String
    Default: c7i.large
  RagS3BucketName:
    Type: String
    Default: gatelm-rag-production-431772290654-ap-northeast-2
    AllowedPattern: "^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$"
    Description: Existing production RAG bucket reused by the isolated clone.
  RagKmsKeyArn:
    Type: String
    Default: arn:aws:kms:ap-northeast-2:431772290654:key/d4fa8d01-d97d-471a-9504-b518e5930251
    AllowedPattern: "^arn:aws:kms:[a-z0-9-]+:[0-9]{12}:key/[0-9a-f-]{36}$"
    Description: Existing production RAG KMS key used through S3 only.

Resources:
  PerfVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.77.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: gatelm-perf-distributed-vpc
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: perf-distributed
        - Key: ManagedBy
          Value: CloudFormation

  PerfInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: gatelm-perf-distributed-igw
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: perf-distributed

  PerfInternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref PerfInternetGateway
      VpcId: !Ref PerfVpc

  PerfSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.77.1.0/24
      MapPublicIpOnLaunch: true
      VpcId: !Ref PerfVpc
      Tags:
        - Key: Name
          Value: gatelm-perf-distributed-subnet
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: perf-distributed

  PerfRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref PerfVpc
      Tags:
        - Key: Name
          Value: gatelm-perf-distributed-routes
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: perf-distributed

  PerfDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: PerfInternetGatewayAttachment
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref PerfInternetGateway
      RouteTableId: !Ref PerfRouteTable

  PerfSubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PerfRouteTable
      SubnetId: !Ref PerfSubnet

  PerfNodeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: perf-distributed

  PerfNodeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref PerfNodeRole]

  PerfDataRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: GateLMProductionCloneRagObjectStorage
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ListProductionRagBucket
                Effect: Allow
                Action: s3:ListBucket
                Resource: !Sub arn:aws:s3:::${RagS3BucketName}
              - Sid: ManageProductionRagObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub arn:aws:s3:::${RagS3BucketName}/*
              - Sid: UseProductionRagKmsThroughS3
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:Encrypt
                  - kms:GenerateDataKey
                Resource: !Ref RagKmsKeyArn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub s3.${AWS::Region}.amazonaws.com
                    kms:CallerAccount: !Ref AWS::AccountId
      Tags:
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: perf-distributed
        - Key: CloneRole
          Value: data

  PerfDataInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref PerfDataRole]

  LoadGeneratorSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: GateLM performance load generator; SSH from operator only.
      GroupName: gatelm-perf-distributed-loadgen
      VpcId: !Ref PerfVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref OperatorCidr
          Description: SSH from current trusted operator IPv4 only
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref EdgeIngressCidr
          Description: Rehearsal or public HTTP to the production-clone Edge only
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref EdgeIngressCidr
          Description: Rehearsal or public HTTPS to the production-clone Edge only
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Package and certificate HTTP traffic
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Package SSM and certificate HTTPS traffic
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: 10.77.0.2/32
          Description: VPC DNS
        - IpProtocol: tcp
          FromPort: 53
          ToPort: 53
          CidrIp: 10.77.0.2/32
          Description: VPC DNS fallback
        - IpProtocol: udp
          FromPort: 123
          ToPort: 123
          CidrIp: 169.254.169.123/32
          Description: Amazon Time Sync Service
        - IpProtocol: tcp
          FromPort: 18080
          ToPort: 18080
          CidrIp: 10.77.1.20/32
          Description: Existing performance Gateway load traffic
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 10.77.1.20/32
          Description: Edge to production-clone Gateway
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          CidrIp: 10.77.1.30/32
          Description: Edge to Control Plane
        - IpProtocol: tcp
          FromPort: 3003
          ToPort: 3003
          CidrIp: 10.77.1.30/32
          Description: Edge Chat Web to private Chat API
      Tags:
        - Key: Name
          Value: gatelm-perf-distributed-loadgen
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: perf-distributed

  GatewaySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: GateLM dedicated performance Gateway node.
      GroupName: gatelm-perf-distributed-gateway
      VpcId: !Ref PerfVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref OperatorCidr
          Description: SSH from current trusted operator IPv4 only
        - IpProtocol: tcp
          FromPort: 18080
          ToPort: 18080
          SourceSecurityGroupId: !Ref LoadGeneratorSecurityGroup
          Description: k6 load traffic from dedicated load generator
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref LoadGeneratorSecurityGroup
          Description: Public data plane from Edge only
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Package HTTP traffic
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Provider package and SSM HTTPS traffic
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: 10.77.0.2/32
          Description: VPC DNS
        - IpProtocol: tcp
          FromPort: 53
          ToPort: 53
          CidrIp: 10.77.0.2/32
          Description: VPC DNS fallback
        - IpProtocol: udp
          FromPort: 123
          ToPort: 123
          CidrIp: 169.254.169.123/32
          Description: Amazon Time Sync Service
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          CidrIp: 10.77.1.30/32
          Description: Gateway to Control Plane
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 10.77.1.30/32
          Description: Gateway to PostgreSQL
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          CidrIp: 10.77.1.30/32
          Description: Gateway to Redis
        - IpProtocol: tcp
          FromPort: 8001
          ToPort: 8001
          CidrIp: 10.77.1.40/32
          Description: Gateway to AI Service
        - IpProtocol: tcp
          FromPort: 8090
          ToPort: 8090
          CidrIp: 10.77.1.40/32
          Description: Gateway to isolated Mock Provider
      Tags:
        - Key: Name
          Value: gatelm-perf-distributed-gateway
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: perf-distributed

  DataSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: GateLM isolated performance PostgreSQL Redis and Control Plane.
      GroupName: gatelm-perf-distributed-data
      VpcId: !Ref PerfVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref OperatorCidr
          Description: SSH from current trusted operator IPv4 only
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref GatewaySecurityGroup
          Description: PostgreSQL from Gateway only
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref GatewaySecurityGroup
          Description: Redis from Gateway only
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          SourceSecurityGroupId: !Ref GatewaySecurityGroup
          Description: Control Plane from Gateway only
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          SourceSecurityGroupId: !Ref LoadGeneratorSecurityGroup
          Description: Control Plane from Edge Web only
        - IpProtocol: tcp
          FromPort: 3003
          ToPort: 3003
          SourceSecurityGroupId: !Ref LoadGeneratorSecurityGroup
          Description: Private Chat API from Edge Chat Web only
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Package HTTP traffic
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: AWS OAuth package and SSM HTTPS traffic
        - IpProtocol: tcp
          FromPort: 465
          ToPort: 465
          CidrIp: 0.0.0.0/0
          Description: Production SMTP over TLS when enabled
        - IpProtocol: tcp
          FromPort: 587
          ToPort: 587
          CidrIp: 0.0.0.0/0
          Description: Production SMTP submission when enabled
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: 10.77.0.2/32
          Description: VPC DNS
        - IpProtocol: tcp
          FromPort: 53
          ToPort: 53
          CidrIp: 10.77.0.2/32
          Description: VPC DNS fallback
        - IpProtocol: udp
          FromPort: 123
          ToPort: 123
          CidrIp: 169.254.169.123/32
          Description: Amazon Time Sync Service
        - IpProtocol: tcp
          FromPort: 8081
          ToPort: 8081
          CidrIp: 10.77.1.20/32
          Description: Chat API and RAG Worker to private Gateway
        - IpProtocol: tcp
          FromPort: 8001
          ToPort: 8001
          CidrIp: 10.77.1.40/32
          Description: RAG Worker to AI Service
      Tags:
        - Key: Name
          Value: gatelm-perf-distributed-data
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: perf-distributed

  DataPostgresSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref DataSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref DataSecurityGroup
      Description: Control Plane to co-located PostgreSQL

  DataRedisSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref DataSecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      SourceSecurityGroupId: !Ref DataSecurityGroup
      Description: Control Plane to co-located Redis

  GatewayPrivateDataIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref GatewaySecurityGroup
      IpProtocol: tcp
      FromPort: 8081
      ToPort: 8081
      SourceSecurityGroupId: !Ref DataSecurityGroup
      Description: Private Tenant Chat and RAG traffic from Data only

  MockSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: GateLM isolated 100ms Mock Provider.
      GroupName: gatelm-perf-distributed-mock
      VpcId: !Ref PerfVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref OperatorCidr
          Description: SSH from current trusted operator IPv4 only
        - IpProtocol: tcp
          FromPort: 8090
          ToPort: 8090
          SourceSecurityGroupId: !Ref GatewaySecurityGroup
          Description: Mock Provider requests from Gateway only
        - IpProtocol: tcp
          FromPort: 8001
          ToPort: 8001
          SourceSecurityGroupId: !Ref GatewaySecurityGroup
          Description: AI Safety requests from Gateway only
        - IpProtocol: tcp
          FromPort: 8001
          ToPort: 8001
          SourceSecurityGroupId: !Ref DataSecurityGroup
          Description: RAG extraction requests from Data only
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Package HTTP traffic
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Package model and SSM HTTPS traffic
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: 10.77.0.2/32
          Description: VPC DNS
        - IpProtocol: tcp
          FromPort: 53
          ToPort: 53
          CidrIp: 10.77.0.2/32
          Description: VPC DNS fallback
        - IpProtocol: udp
          FromPort: 123
          ToPort: 123
          CidrIp: 169.254.169.123/32
          Description: Amazon Time Sync Service
      Tags:
        - Key: Name
          Value: gatelm-perf-distributed-mock
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: perf-distributed

  LoadGeneratorInstance:
    Type: AWS::EC2::Instance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !GetAtt PerfSubnet.AvailabilityZone
      DisableApiTermination: true
      EbsOptimized: true
      ImageId: !Ref UbuntuAmiId
      IamInstanceProfile: !Ref PerfNodeInstanceProfile
      InstanceInitiatedShutdownBehavior: stop
      InstanceType: !Ref LoadGeneratorInstanceType
      KeyName: !Ref SshKeyName
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeleteOnTermination: true
          DeviceIndex: "0"
          GroupSet: [!Ref LoadGeneratorSecurityGroup]
          PrivateIpAddress: 10.77.1.10
          SubnetId: !Ref PerfSubnet
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            DeleteOnTermination: false
            Encrypted: true
            Iops: 3000
            VolumeSize: 24
            VolumeType: gp3
      UserData: !Base64
        Fn::Sub: |
          #!/usr/bin/env bash
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y ca-certificates curl docker-compose-v2 docker.io git jq postgresql-client python3
          systemctl enable --now docker
          usermod -aG docker ubuntu
          install -d -o ubuntu -g ubuntu -m 0755 /home/ubuntu/GateLM
          printf '%s\n' loadgen > /etc/gatelm-perf-role
      Tags:
        - Key: Name
          Value: gatelm-perf-distributed-loadgen
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: perf-distributed
        - Key: Role
          Value: loadgen
        - Key: CloneRole
          Value: edge
        - Key: DoNotDelete
          Value: "true"

  GatewayInstance:
    Type: AWS::EC2::Instance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !GetAtt PerfSubnet.AvailabilityZone
      DisableApiTermination: true
      EbsOptimized: true
      ImageId: !Ref UbuntuAmiId
      IamInstanceProfile: !Ref PerfNodeInstanceProfile
      InstanceInitiatedShutdownBehavior: stop
      InstanceType: !Ref GatewayInstanceType
      KeyName: !Ref SshKeyName
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeleteOnTermination: true
          DeviceIndex: "0"
          GroupSet: [!Ref GatewaySecurityGroup]
          PrivateIpAddress: 10.77.1.20
          SubnetId: !Ref PerfSubnet
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            DeleteOnTermination: false
            Encrypted: true
            Iops: 3000
            VolumeSize: 30
            VolumeType: gp3
      UserData: !Base64
        Fn::Sub: |
          #!/usr/bin/env bash
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y ca-certificates curl docker-compose-v2 docker.io git jq postgresql-client python3
          systemctl enable --now docker
          usermod -aG docker ubuntu
          install -d -o ubuntu -g ubuntu -m 0755 /home/ubuntu/GateLM
          printf '%s\n' gateway > /etc/gatelm-perf-role
      Tags:
        - Key: Name
          Value: gatelm-perf-distributed-gateway
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: perf-distributed
        - Key: Role
          Value: gateway
        - Key: CloneRole
          Value: gateway
        - Key: DoNotDelete
          Value: "true"

  DataInstance:
    Type: AWS::EC2::Instance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !GetAtt PerfSubnet.AvailabilityZone
      DisableApiTermination: true
      EbsOptimized: true
      ImageId: !Ref UbuntuAmiId
      IamInstanceProfile: !Ref PerfDataInstanceProfile
      InstanceInitiatedShutdownBehavior: stop
      InstanceType: !Ref DataInstanceType
      KeyName: !Ref SshKeyName
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeleteOnTermination: true
          DeviceIndex: "0"
          GroupSet: [!Ref DataSecurityGroup]
          PrivateIpAddress: 10.77.1.30
          SubnetId: !Ref PerfSubnet
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            DeleteOnTermination: false
            Encrypted: true
            Iops: 3000
            VolumeSize: 40
            VolumeType: gp3
      UserData: !Base64
        Fn::Sub: |
          #!/usr/bin/env bash
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y ca-certificates curl docker-compose-v2 docker.io git jq postgresql-client python3
          systemctl enable --now docker
          usermod -aG docker ubuntu
          install -d -o ubuntu -g ubuntu -m 0755 /home/ubuntu/GateLM
          printf '%s\n' data > /etc/gatelm-perf-role
      Tags:
        - Key: Name
          Value: gatelm-perf-distributed-data
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: perf-distributed
        - Key: Role
          Value: data
        - Key: CloneRole
          Value: data
        - Key: DoNotDelete
          Value: "true"

  MockInstance:
    Type: AWS::EC2::Instance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !GetAtt PerfSubnet.AvailabilityZone
      DisableApiTermination: true
      EbsOptimized: true
      ImageId: !Ref UbuntuAmiId
      IamInstanceProfile: !Ref PerfNodeInstanceProfile
      InstanceInitiatedShutdownBehavior: stop
      InstanceType: !Ref MockInstanceType
      KeyName: !Ref SshKeyName
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeleteOnTermination: true
          DeviceIndex: "0"
          GroupSet: [!Ref MockSecurityGroup]
          PrivateIpAddress: 10.77.1.40
          SubnetId: !Ref PerfSubnet
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            DeleteOnTermination: false
            Encrypted: true
            Iops: 3000
            VolumeSize: 24
            VolumeType: gp3
      UserData: !Base64
        Fn::Sub: |
          #!/usr/bin/env bash
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y ca-certificates curl docker-compose-v2 docker.io git jq postgresql-client python3
          systemctl enable --now docker
          usermod -aG docker ubuntu
          install -d -o ubuntu -g ubuntu -m 0755 /home/ubuntu/GateLM
          printf '%s\n' mock > /etc/gatelm-perf-role
      Tags:
        - Key: Name
          Value: gatelm-perf-distributed-mock
        - Key: Project
          Value: GateLM
        - Key: Environment
          Value: perf-distributed
        - Key: Role
          Value: mock
        - Key: CloneRole
          Value: ai
        - Key: DoNotDelete
          Value: "true"

Outputs:
  VpcId:
    Value: !Ref PerfVpc
  SubnetId:
    Value: !Ref PerfSubnet
  LoadGeneratorInstanceId:
    Value: !Ref LoadGeneratorInstance
  LoadGeneratorPrivateIp:
    Value: !GetAtt LoadGeneratorInstance.PrivateIp
  LoadGeneratorPublicIp:
    Value: !GetAtt LoadGeneratorInstance.PublicIp
  GatewayInstanceId:
    Value: !Ref GatewayInstance
  GatewayPrivateIp:
    Value: !GetAtt GatewayInstance.PrivateIp
  GatewayPublicIp:
    Value: !GetAtt GatewayInstance.PublicIp
  DataInstanceId:
    Value: !Ref DataInstance
  DataPrivateIp:
    Value: !GetAtt DataInstance.PrivateIp
  DataPublicIp:
    Value: !GetAtt DataInstance.PublicIp
  MockInstanceId:
    Value: !Ref MockInstance
  MockPrivateIp:
    Value: !GetAtt MockInstance.PrivateIp
  MockPublicIp:
    Value: !GetAtt MockInstance.PublicIp
  LoadGeneratorSecurityGroupId:
    Value: !Ref LoadGeneratorSecurityGroup
  GatewaySecurityGroupId:
    Value: !Ref GatewaySecurityGroup
  DataSecurityGroupId:
    Value: !Ref DataSecurityGroup
  MockSecurityGroupId:
    Value: !Ref MockSecurityGroup
  PerfNodeInstanceProfileName:
    Value: !Ref PerfNodeInstanceProfile
  PerfDataInstanceProfileName:
    Value: !Ref PerfDataInstanceProfile
