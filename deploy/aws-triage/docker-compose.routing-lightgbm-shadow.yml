services:
  gateway-core:
    environment:
      # The authoritative LR remote remains enabled by the base distributed profile.
      GATEWAY_DIFFICULTY_LIGHTGBM_SHADOW_ENABLED: ${GATEWAY_DIFFICULTY_LIGHTGBM_SHADOW_ENABLED:-false}
      GATEWAY_DIFFICULTY_LIGHTGBM_SHADOW_ALLOWED_SCOPES: ${GATEWAY_DIFFICULTY_LIGHTGBM_SHADOW_ALLOWED_SCOPES:-}
      GATEWAY_DIFFICULTY_LIGHTGBM_SHADOW_SAMPLING_BASIS_POINTS: ${GATEWAY_DIFFICULTY_LIGHTGBM_SHADOW_SAMPLING_BASIS_POINTS:-1000}
      GATEWAY_DIFFICULTY_LIGHTGBM_SHADOW_URL: http://ai-service-lightgbm-shadow:8003/internal/routing/difficulty/lightgbm-shadow/v1/classify
      GATEWAY_DIFFICULTY_LIGHTGBM_SHADOW_SERVICE_TOKEN: ${GATEWAY_DIFFICULTY_LIGHTGBM_SHADOW_SERVICE_TOKEN:-}
      GATEWAY_DIFFICULTY_LIGHTGBM_SHADOW_MODEL_VERSION: ${GATEWAY_DIFFICULTY_LIGHTGBM_SHADOW_MODEL_VERSION:-}
      GATEWAY_DIFFICULTY_LIGHTGBM_SHADOW_MODEL_CONTENT_HASH: ${GATEWAY_DIFFICULTY_LIGHTGBM_SHADOW_MODEL_CONTENT_HASH:-}
      GATEWAY_DIFFICULTY_LIGHTGBM_SHADOW_TIMEOUT_MS: ${GATEWAY_DIFFICULTY_LIGHTGBM_SHADOW_TIMEOUT_MS:-500}
      GATEWAY_DIFFICULTY_LIGHTGBM_SHADOW_MAX_CONCURRENT: ${GATEWAY_DIFFICULTY_LIGHTGBM_SHADOW_MAX_CONCURRENT:-4}

  ai-service-lightgbm-shadow:
    profiles: [routing-lightgbm-shadow]
    image: gatelm/ai-service:routing-lightgbm-shadow
    build:
      context: ../..
      dockerfile: infra/docker/ai-service.Dockerfile
      args:
        AI_SERVICE_INSTALL_ML_DEPS: "true"
        AI_SERVICE_ML_EXTRA: routing-lightgbm
    restart: unless-stopped
    init: true
    environment:
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-staging}
      AI_SERVICE_HOST: 0.0.0.0
      AI_SERVICE_PORT: "8003"
      AI_SERVICE_LOG_LEVEL: INFO
      AI_SERVICE_ACCESS_LOG_ENABLED: "false"
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
      TENANT_CHAT_RAG_ENABLED: "false"
      AI_SERVICE_ROUTING_DIFFICULTY_ENABLED: "false"
      AI_SERVICE_ROUTING_LIGHTGBM_SHADOW_ENABLED: "true"
      AI_SERVICE_ROUTING_LIGHTGBM_SHADOW_SERVICE_TOKEN: ${GATEWAY_DIFFICULTY_LIGHTGBM_SHADOW_SERVICE_TOKEN:?LightGBM shadow service token is required}
      AI_SERVICE_ROUTING_LIGHTGBM_SHADOW_ARTIFACT_ROOT: /opt/gatelm/difficulty-lightgbm-shadow
      AI_SERVICE_ROUTING_LIGHTGBM_SHADOW_PROFILE_MANIFEST: /opt/gatelm/difficulty-lightgbm-shadow/difficulty-lightgbm-shadow-profile.v1.json
      AI_SERVICE_ROUTING_LIGHTGBM_SHADOW_PROFILE_MANIFEST_SHA256: ${AI_SERVICE_ROUTING_LIGHTGBM_SHADOW_PROFILE_MANIFEST_SHA256:?LightGBM shadow profile manifest SHA-256 is required}
      AI_SERVICE_ROUTING_LIGHTGBM_SHADOW_MAX_CONCURRENT: ${AI_SERVICE_ROUTING_LIGHTGBM_SHADOW_MAX_CONCURRENT:-4}
      AI_SERVICE_ROUTING_LIGHTGBM_SHADOW_WORKER_COUNT: ${AI_SERVICE_ROUTING_LIGHTGBM_SHADOW_WORKER_COUNT:-1}
      AI_SERVICE_ROUTING_LIGHTGBM_SHADOW_ONNX_INTRA_OP_THREADS: ${AI_SERVICE_ROUTING_LIGHTGBM_SHADOW_ONNX_INTRA_OP_THREADS:-1}
      AI_SERVICE_ROUTING_LIGHTGBM_SHADOW_ONNX_INTER_OP_THREADS: ${AI_SERVICE_ROUTING_LIGHTGBM_SHADOW_ONNX_INTER_OP_THREADS:-1}
    volumes:
      - ${GATELM_LIGHTGBM_SHADOW_ARTIFACT_ROOT:?LightGBM shadow artifact root is required}:/opt/gatelm/difficulty-lightgbm-shadow:ro
    mem_limit: ${AI_SERVICE_LIGHTGBM_SHADOW_MEMORY_LIMIT:-4g}
    pids_limit: ${AI_SERVICE_LIGHTGBM_SHADOW_PIDS_LIMIT:-256}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/readyz', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 120s
    networks: [role_internal]
