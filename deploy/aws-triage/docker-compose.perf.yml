name: gatelm-aws-perf

services:
  postgres:
    restart: "no"

  redis:
    restart: "no"

  mock-provider:
    image: node:22-alpine@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2
    restart: "no"
    init: true
    user: node
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    environment:
      FAST_NOOP_MOCK_HOST: 0.0.0.0
      FAST_NOOP_MOCK_PORT: "8090"
      FAST_NOOP_MOCK_DEFAULT_LATENCY_MS: ${MOCK_PROVIDER_DEFAULT_LATENCY_MS:-100}
    command: ["node", "/workspace/scripts/dev/fast-noop-mock-provider.mjs"]
    volumes:
      - ../..:/workspace:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8090/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  control-plane-api:
    restart: "no"
    environment:
      NODE_ENV: production
      GATELM_DEPLOYMENT_ENV: perf
      GATELM_DEMO_PROVIDER_MODE: mock
      GATELM_DEMO_MOCK_PROVIDER_BASE_URL: http://mock-provider:8090
      GATELM_DEMO_TENANT_ID: ${GATELM_DEMO_TENANT_ID}
      GATELM_DEMO_PROJECT_ID: ${GATELM_DEMO_PROJECT_ID}
      GATELM_DEMO_APPLICATION_ID: ${GATELM_DEMO_APPLICATION_ID}
      GATELM_PROVIDER_CREDENTIAL_ENCRYPTION_KEY: ""
      CONTROL_PLANE_PROVIDER_CREDENTIAL_ENV_MAP: ""
      OPENAI_API_KEY: ""

  gateway-core:
    restart: "no"
    environment:
      GATEWAY_DEFAULT_PROVIDER: mock
      GATEWAY_DEFAULT_MODEL: mock-balanced
      GATEWAY_LOW_COST_MODEL: mock-fast
      GATEWAY_HIGH_QUALITY_MODEL: mock-smart
      GATEWAY_AI_SAFETY_SIDECAR_ENABLED: "false"
      GATEWAY_PROVIDER_MAX_IDLE_CONNS: ${GATELM_PERF_PROVIDER_MAX_IDLE_CONNS:-512}
      GATEWAY_PROVIDER_MAX_IDLE_CONNS_PER_HOST: ${GATELM_PERF_PROVIDER_MAX_IDLE_CONNS_PER_HOST:-256}
      GATEWAY_PROVIDER_MAX_CONNS_PER_HOST: ${GATELM_PERF_PROVIDER_MAX_CONNS_PER_HOST:-256}
      GATEWAY_PROVIDER_IDLE_CONN_TIMEOUT_MS: ${GATELM_PERF_PROVIDER_IDLE_CONN_TIMEOUT_MS:-90000}
      GATEWAY_PROVIDER_DIAL_TIMEOUT_MS: ${GATELM_PERF_PROVIDER_DIAL_TIMEOUT_MS:-5000}
      GATEWAY_PROVIDER_DIAL_KEEP_ALIVE_MS: ${GATELM_PERF_PROVIDER_DIAL_KEEP_ALIVE_MS:-30000}
      GATEWAY_PROVIDER_TLS_HANDSHAKE_TIMEOUT_MS: ${GATELM_PERF_PROVIDER_TLS_HANDSHAKE_TIMEOUT_MS:-10000}
      GATEWAY_DATABASE_MAX_CONNS: ${GATELM_PERF_DATABASE_MAX_CONNS:-16}
      GATEWAY_DATABASE_MIN_CONNS: ${GATELM_PERF_DATABASE_MIN_CONNS:-2}
      GATEWAY_LOG_DATABASE_MAX_CONNS: ${GATELM_PERF_LOG_DATABASE_MAX_CONNS:-4}
      GATEWAY_LOG_DATABASE_MIN_CONNS: ${GATELM_PERF_LOG_DATABASE_MIN_CONNS:-2}
      GATEWAY_AUTH_CACHE_ENABLED: "true"
      GATEWAY_AUTH_CACHE_TTL_MS: ${GATELM_PERF_AUTH_CACHE_TTL_MS:-1000}
      GATEWAY_AUTH_CACHE_MAX_ENTRIES: ${GATELM_PERF_AUTH_CACHE_MAX_ENTRIES:-4096}
      GATEWAY_PRICING_CACHE_ENABLED: "true"
      GATEWAY_PRICING_CACHE_TTL_MS: ${GATELM_PERF_PRICING_CACHE_TTL_MS:-5000}
      GATEWAY_PRICING_CACHE_MAX_ENTRIES: ${GATELM_PERF_PRICING_CACHE_MAX_ENTRIES:-1024}
      GATEWAY_ASYNC_LOG_QUEUE_SIZE: ${GATELM_PERF_ASYNC_LOG_QUEUE_SIZE:-10000}
      GATEWAY_ASYNC_LOG_WORKER_COUNT: ${GATELM_PERF_ASYNC_LOG_WORKER_COUNT:-2}
      GATEWAY_ASYNC_LOG_BATCH_SIZE: ${GATELM_PERF_ASYNC_LOG_BATCH_SIZE:-100}
      GATEWAY_ASYNC_LOG_BATCH_FLUSH_INTERVAL_MS: ${GATELM_PERF_ASYNC_LOG_BATCH_FLUSH_INTERVAL_MS:-10}
      GATEWAY_ASYNC_LOG_WRITE_TIMEOUT_MS: ${GATELM_PERF_ASYNC_LOG_WRITE_TIMEOUT_MS:-5000}
      GATEWAY_ASYNC_LOG_SHUTDOWN_TIMEOUT_MS: ${GATELM_PERF_ASYNC_LOG_SHUTDOWN_TIMEOUT_MS:-30000}
      GATELM_PROVIDER_CREDENTIAL_ENCRYPTION_KEY: ""
      GATEWAY_PROVIDER_CREDENTIAL_ENV_MAP: ""
      OPENAI_API_KEY: ""

  ai-service:
    restart: "no"

  web:
    restart: "no"

volumes:
  postgres_data:
    name: gatelm-aws-perf-postgres-data
  redis_data:
    name: gatelm-aws-perf-redis-data

networks:
  gatelm_internal:
    name: gatelm-aws-perf-internal
