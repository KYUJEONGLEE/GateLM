name: gatelm-selfhost

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${SELFHOST_POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - gatelm_internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${SELFHOST_REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - gatelm_internal

  mock-provider:
    image: python:3.12-alpine
    restart: unless-stopped
    environment:
      MOCK_PROVIDER_PORT: "8090"
      MOCK_PROVIDER_DEFAULT_LATENCY_MS: ${MOCK_PROVIDER_DEFAULT_LATENCY_MS}
    command:
      - python
      - -c
      - |
        import json, os, time
        from http.server import BaseHTTPRequestHandler, HTTPServer

        port = int(os.getenv("MOCK_PROVIDER_PORT", "8090"))
        latency_ms = int(os.getenv("MOCK_PROVIDER_DEFAULT_LATENCY_MS", "100"))

        def stream_chunks(model):
            created = int(time.time())
            return [
                {
                    "id": "mock_chatcmpl_stream_selfhost",
                    "object": "chat.completion.chunk",
                    "created": created,
                    "model": model,
                    "choices": [{"index": 0, "delta": {"role": "assistant"}, "finish_reason": None}],
                },
                {
                    "id": "mock_chatcmpl_stream_selfhost",
                    "object": "chat.completion.chunk",
                    "created": created,
                    "model": model,
                    "choices": [{"index": 0, "delta": {"content": "GateLM self-host mock streaming 응답입니다. "}, "finish_reason": None}],
                },
                {
                    "id": "mock_chatcmpl_stream_selfhost",
                    "object": "chat.completion.chunk",
                    "created": created,
                    "model": model,
                    "choices": [{"index": 0, "delta": {"content": "실제 Provider 비용 없이 SSE relay를 확인합니다."}, "finish_reason": None}],
                },
                {
                    "id": "mock_chatcmpl_stream_selfhost",
                    "object": "chat.completion.chunk",
                    "created": created,
                    "model": model,
                    "choices": [{"index": 0, "delta": {}, "finish_reason": "stop"}],
                    "usage": {"prompt_tokens": 1, "completion_tokens": 1, "total_tokens": 2},
                },
            ]

        class Handler(BaseHTTPRequestHandler):
            def log_message(self, format, *args):
                return

            def send_json(self, status, payload):
                body = json.dumps(payload).encode("utf-8")
                self.send_response(status)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)

            def send_stream(self, model):
                self.send_response(200)
                self.send_header("Content-Type", "text/event-stream; charset=utf-8")
                self.send_header("Cache-Control", "no-cache")
                self.send_header("Connection", "keep-alive")
                self.send_header("X-Accel-Buffering", "no")
                self.end_headers()
                for chunk in stream_chunks(model):
                    data = json.dumps(chunk, ensure_ascii=False)
                    self.wfile.write(("data: " + data + "\n\n").encode("utf-8"))
                    self.wfile.flush()
                    time.sleep(0.02)
                self.wfile.write(b"data: [DONE]\n\n")
                self.wfile.flush()

            def do_GET(self):
                if self.path == "/healthz":
                    self.send_json(200, {"status": "ok"})
                    return
                if self.path == "/v1/models":
                    self.send_json(200, {"object": "list", "data": [
                        {"id": "mock-fast", "object": "model", "owned_by": "gatelm-selfhost"},
                        {"id": "mock-balanced", "object": "model", "owned_by": "gatelm-selfhost"},
                        {"id": "mock-smart", "object": "model", "owned_by": "gatelm-selfhost"}
                    ]})
                    return
                self.send_json(404, {"error": {"code": "not_found"}})

            def do_POST(self):
                if self.path != "/v1/chat/completions":
                    self.send_json(404, {"error": {"code": "not_found"}})
                    return
                length = int(self.headers.get("Content-Length", "0"))
                raw = self.rfile.read(length) if length else b"{}"
                try:
                    payload = json.loads(raw.decode("utf-8"))
                except Exception:
                    payload = {}
                time.sleep(latency_ms / 1000)
                model = str(payload.get("model") or "mock-balanced").strip() or "mock-balanced"
                if payload.get("stream") is True:
                    self.send_stream(model)
                    return
                self.send_json(200, {
                    "id": "mock_chatcmpl_selfhost",
                    "object": "chat.completion",
                    "created": int(time.time()),
                    "model": model,
                    "choices": [{
                        "index": 0,
                        "message": {
                            "role": "assistant",
                            "content": "Mock response generated by GateLM self-host mock provider."
                        },
                        "finish_reason": "stop"
                    }],
                    "usage": {"prompt_tokens": 1, "completion_tokens": 1, "total_tokens": 2}
                })

        HTTPServer(("0.0.0.0", port), Handler).serve_forever()
    ports:
      - "${SELFHOST_MOCK_PROVIDER_PORT}:8090"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/healthz', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - gatelm_internal

  control-plane-api:
    image: ${GATELM_IMAGE_REGISTRY}/control-plane-api:${GATELM_IMAGE_TAG}
    restart: unless-stopped
    environment:
      CONTROL_PLANE_PORT: "3001"
      CONTROL_PLANE_ADMIN_AUTH_MODE: ${CONTROL_PLANE_ADMIN_AUTH_MODE}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "${SELFHOST_CONTROL_PLANE_PORT}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - gatelm_internal

  gateway-core:
    image: ${GATELM_IMAGE_REGISTRY}/gateway-core:${GATELM_IMAGE_TAG}
    restart: unless-stopped
    environment:
      GATEWAY_PORT: "8080"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      GATEWAY_CONTROL_PLANE_BASE_URL: http://control-plane-api:3001
      GATEWAY_CONTROL_PLANE_TIMEOUT_MS: ${GATEWAY_CONTROL_PLANE_TIMEOUT_MS}
      MOCK_PROVIDER_BASE_URL: http://mock-provider:8090
      GATEWAY_DEFAULT_PROVIDER: ${GATEWAY_DEFAULT_PROVIDER}
      GATEWAY_DEFAULT_MODEL: ${GATEWAY_DEFAULT_MODEL}
      GATEWAY_LOW_COST_MODEL: ${GATEWAY_LOW_COST_MODEL}
      GATEWAY_HIGH_QUALITY_MODEL: ${GATEWAY_HIGH_QUALITY_MODEL}
      GATEWAY_EXACT_CACHE_KEY_SECRET: ${GATEWAY_EXACT_CACHE_KEY_SECRET}
      GATEWAY_MAX_REQUEST_BODY_BYTES: ${GATEWAY_MAX_REQUEST_BODY_BYTES}
      GATEWAY_RATE_LIMIT_ENABLED: ${GATEWAY_RATE_LIMIT_ENABLED}
      GATEWAY_RATE_LIMIT_WINDOW_SECONDS: ${GATEWAY_RATE_LIMIT_WINDOW_SECONDS}
      GATEWAY_RATE_LIMIT_LIMIT: ${GATEWAY_RATE_LIMIT_LIMIT}
      GATEWAY_PROVIDER_CREDENTIAL_ENV_MAP: ${GATEWAY_PROVIDER_CREDENTIAL_ENV_MAP}
      GATELM_DEMO_API_KEY: ${GATELM_DEMO_API_KEY}
      GATELM_DEMO_APP_TOKEN: ${GATELM_DEMO_APP_TOKEN}
      GATELM_DEMO_TENANT_ID: ${GATELM_DEMO_TENANT_ID}
      GATELM_DEMO_PROJECT_ID: ${GATELM_DEMO_PROJECT_ID}
      GATELM_DEMO_APPLICATION_ID: ${GATELM_DEMO_APPLICATION_ID}
      GATELM_DEMO_API_KEY_ID: ${GATELM_DEMO_API_KEY_ID}
      GATELM_DEMO_APP_TOKEN_ID: ${GATELM_DEMO_APP_TOKEN_ID}
    ports:
      - "${SELFHOST_GATEWAY_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-provider:
        condition: service_healthy
      control-plane-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -aq gateway-core /proc/1/cmdline"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - gatelm_internal

  ai-service:
    image: ${GATELM_IMAGE_REGISTRY}/ai-service:${GATELM_IMAGE_TAG}
    build:
      context: ../..
      dockerfile: infra/docker/ai-service.Dockerfile
      args:
        AI_SERVICE_INSTALL_ML_DEPS: ${AI_SERVICE_INSTALL_ML_DEPS}
    restart: unless-stopped
    environment:
      AI_SERVICE_HOST: 0.0.0.0
      AI_SERVICE_PORT: "8001"
      AI_SERVICE_LOG_LEVEL: ${AI_SERVICE_LOG_LEVEL}
      AI_SERVICE_REMOTE_SAFETY_MODE: ${AI_SERVICE_REMOTE_SAFETY_MODE}
      AI_SERVICE_ACCESS_LOG_ENABLED: ${AI_SERVICE_ACCESS_LOG_ENABLED}
      TRANSFORMERS_OFFLINE: ${AI_SERVICE_TRANSFORMERS_OFFLINE}
      HF_HUB_OFFLINE: ${AI_SERVICE_TRANSFORMERS_OFFLINE}
      AI_SERVICE_AI_SAFETY_DETECTOR_MODEL_ID: ${AI_SERVICE_AI_SAFETY_DETECTOR_MODEL_ID}
      AI_SERVICE_AI_SAFETY_ADDITIONAL_DETECTOR_MODEL_IDS: ${AI_SERVICE_AI_SAFETY_ADDITIONAL_DETECTOR_MODEL_IDS}
    volumes:
      - ../../apps/ai-service/.cache/huggingface/models:/app/.cache/huggingface/models:ro
    ports:
      - "${SELFHOST_AI_SERVICE_PORT}:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/healthz', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - gatelm_internal

  web:
    image: ${GATELM_IMAGE_REGISTRY}/web:${GATELM_IMAGE_TAG}
    restart: unless-stopped
    environment:
      PORT: "3000"
      GATELM_PUBLIC_DOMAIN: ${GATELM_PUBLIC_DOMAIN}
      GATELM_PUBLIC_BASE_URL: ${GATELM_PUBLIC_BASE_URL}
      GATELM_CONTROL_PLANE_BASE_URL: http://control-plane-api:3001
      GATELM_GATEWAY_BASE_URL: http://gateway-core:8080
      GATELM_CONTROL_PLANE_TENANT_ID: ${GATELM_DEMO_TENANT_ID}
      GATELM_CONTROL_PLANE_PROJECT_ID: ${GATELM_DEMO_PROJECT_ID}
      GATELM_CONTROL_PLANE_APPLICATION_ID: ${GATELM_DEMO_APPLICATION_ID}
      GATELM_DEMO_API_KEY: ${GATELM_DEMO_API_KEY}
      GATELM_DEMO_APP_TOKEN: ${GATELM_DEMO_APP_TOKEN}
      GATELM_DEMO_PROJECT_ID: ${GATELM_DEMO_PROJECT_ID}
      GATELM_WEB_CUSTOMER_DEMO_MODE: ${GATELM_WEB_CUSTOMER_DEMO_MODE}
      GATELM_WEB_RATE_LIMIT_MAX_ATTEMPTS: ${GATELM_WEB_RATE_LIMIT_MAX_ATTEMPTS}
    ports:
      - "${SELFHOST_WEB_PORT}:3000"
    depends_on:
      control-plane-api:
        condition: service_healthy
      gateway-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gatelm_internal

volumes:
  postgres_data:
  redis_data:

networks:
  gatelm_internal:
    driver: bridge
