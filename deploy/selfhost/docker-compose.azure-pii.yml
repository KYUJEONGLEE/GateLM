services:
  azure-pii:
    image: "${AZURE_PII_IMAGE:-mcr.microsoft.com/azure-cognitive-services/textanalytics/pii@sha256:c92d80ea5f0c973f9e923a8d93253816a94e60c8bdb63095f10beddd5093ed5c}"
    restart: unless-stopped
    command:
      - "Eula=${AZURE_PII_EULA:?AZURE_PII_EULA must be accept}"
      - "Billing=${AZURE_PII_BILLING_ENDPOINT:?AZURE_PII_BILLING_ENDPOINT is required}"
      - "ApiKey=${AZURE_PII_API_KEY:?AZURE_PII_API_KEY is required}"
    cpus: ${AZURE_PII_CPUS:-4.0}
    mem_limit: ${AZURE_PII_MEMORY_LIMIT:-8g}
    ports:
      - "127.0.0.1:${SELFHOST_AZURE_PII_PORT:-5000}:5000"
    networks:
      - gatelm_internal

  ai-service:
    build:
      args:
        AI_SERVICE_INSTALL_ML_DEPS: "false"
    environment:
      AI_SERVICE_AI_SAFETY_LOCAL_MODEL_ENABLED: "false"
      AI_SERVICE_AI_SAFETY_PRELOAD_ENABLED: "true"
      AI_SERVICE_AZURE_PII_ENABLED: "true"
      AI_SERVICE_AZURE_PII_ENDPOINT: http://azure-pii:5000
      AI_SERVICE_AZURE_PII_API_KEY: ""
      AI_SERVICE_AZURE_PII_API_VERSION: ${AI_SERVICE_AZURE_PII_API_VERSION:-2024-11-01}
      AI_SERVICE_AZURE_PII_LANGUAGE: ${AI_SERVICE_AZURE_PII_LANGUAGE:-ko}
      AI_SERVICE_AZURE_PII_TIMEOUT_MS: ${AI_SERVICE_AZURE_PII_TIMEOUT_MS:-750}
      AI_SERVICE_AZURE_PII_ALLOWED_DETECTOR_TYPES: "${AI_SERVICE_AZURE_PII_ALLOWED_DETECTOR_TYPES:-email,organization_name,person_name,phone_number,postal_address,resident_registration_number}"
    depends_on:
      azure-pii:
        condition: service_started

  gateway-core:
    environment:
      GATEWAY_AI_SAFETY_SIDECAR_ENABLED: "true"
      GATEWAY_AI_SAFETY_SIDECAR_MODEL_ID: microsoft/azure-ai-language-pii
      GATEWAY_AI_SAFETY_SIDECAR_DETECTOR_SET: privacy-filter-default
      GATEWAY_AI_SAFETY_SIDECAR_LOCALE: ko-KR
      GATEWAY_AI_SAFETY_SIDECAR_MODE: enforce
