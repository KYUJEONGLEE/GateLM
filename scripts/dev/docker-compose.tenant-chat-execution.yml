services:
  control-plane-api:
    build:
      context: .
      dockerfile: infra/docker/control-plane-api.Dockerfile
    environment:
      NODE_ENV: development
      CONTROL_PLANE_PORT: "3001"
      DATABASE_URL: ${TENANT_CHAT_SMOKE_DATABASE_URL:-postgresql://gatelm:gatelm@postgres:5432/gatelm?schema=public}
      REDIS_URL: redis://redis:6379
      CONTROL_PLANE_INTERNAL_SERVICE_TOKEN: ${CONTROL_PLANE_INTERNAL_SERVICE_TOKEN:-local-control-plane-internal-token-for-dev-only}
      CONTROL_PLANE_AUTH_STATE_SECRET: ${CONTROL_PLANE_AUTH_STATE_SECRET:?CONTROL_PLANE_AUTH_STATE_SECRET is required}
      CONTROL_PLANE_ADMIN_AUTH_MODE: demo_admin_placeholder
      TENANT_CHAT_CACHE_KEY_SET_ID: ${TENANT_CHAT_CACHE_KEY_SET_ID:-tenant-chat-local-cache-1}
      CONTROL_PLANE_AUTH_DEV_AUTO_VERIFY: "true"
      TENANT_CHAT_CONTROL_PLANE_SERVICE_TOKEN: ${TENANT_CHAT_CONTROL_PLANE_SERVICE_TOKEN:?TENANT_CHAT_CONTROL_PLANE_SERVICE_TOKEN is required}
      GATELM_PROVIDER_CREDENTIAL_ENCRYPTION_KEY: ${GATELM_PROVIDER_CREDENTIAL_ENCRYPTION_KEY:?GATELM_PROVIDER_CREDENTIAL_ENCRYPTION_KEY is required}
      GATELM_PROVIDER_CREDENTIAL_ENCRYPTION_KEY_VERSION: ${GATELM_PROVIDER_CREDENTIAL_ENCRYPTION_KEY_VERSION:-v1}
      TENANT_CHAT_PROJECTOR_ENABLED: "true"
      TENANT_CHAT_RAG_ENABLED: ${TENANT_CHAT_RAG_ENABLED:-false}
      RAG_EMBEDDING_PROVIDER: ${RAG_EMBEDDING_PROVIDER:-openai}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-text-embedding-3-large}
      RAG_EMBEDDING_DIMENSIONS: "${RAG_EMBEDDING_DIMENSIONS:-1536}"
      RAG_EMBEDDING_PROFILE_VERSION: "${RAG_EMBEDDING_PROFILE_VERSION:-1}"
      RAG_DISTANCE_METRIC: ${RAG_DISTANCE_METRIC:-cosine}
      RAG_OBJECT_STORE_DRIVER: fake
      RAG_MAX_UPLOAD_BYTES: "${RAG_MAX_UPLOAD_BYTES:-20971520}"
      TS_NODE_COMPILER_OPTIONS: '{"module":"NodeNext","moduleResolution":"NodeNext"}'
    ports:
      - "127.0.0.1:${CONTROL_PLANE_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway-core:
    platform: linux/amd64
    build:
      context: .
      dockerfile: ${GATELM_GATEWAY_DOCKERFILE:-infra/docker/gateway-core-e5-runtime.Dockerfile}
      additional_contexts:
        difficulty_e5: ${GATELM_DIFFICULTY_E5_BUNDLE_DIR:-.tmp/gateway-e5-runtime-bundle}
    environment:
      GATEWAY_PORT: "8080"
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-local}
      DATABASE_URL: ${TENANT_CHAT_SMOKE_DATABASE_URL:-postgresql://gatelm:gatelm@postgres:5432/gatelm?schema=public}
      REDIS_URL: redis://redis:6379
      GATEWAY_CONTROL_PLANE_BASE_URL: http://control-plane-api:3001
      GATEWAY_CONTROL_PLANE_INTERNAL_TOKEN: ${GATEWAY_CONTROL_PLANE_INTERNAL_TOKEN:-local-control-plane-internal-token-for-dev-only}
      GATEWAY_RUNTIME_SNAPSHOT_MODE: demo
      GATEWAY_DIFFICULTY_E5_RUNTIME_ENABLED: "${GATEWAY_DIFFICULTY_E5_RUNTIME_ENABLED:-true}"
      GATEWAY_DIFFICULTY_E5_RUNTIME_TIMEOUT_MS: ${GATEWAY_DIFFICULTY_E5_RUNTIME_TIMEOUT_MS:-100}
      GATEWAY_DIFFICULTY_E5_SHADOW_ENABLED: "false"
      GATELM_PROVIDER_CREDENTIAL_ENCRYPTION_KEY: ${GATELM_PROVIDER_CREDENTIAL_ENCRYPTION_KEY:?GATELM_PROVIDER_CREDENTIAL_ENCRYPTION_KEY is required}
      GATELM_PROVIDER_CREDENTIAL_ENCRYPTION_KEY_VERSION: ${GATELM_PROVIDER_CREDENTIAL_ENCRYPTION_KEY_VERSION:-v1}
      MOCK_PROVIDER_BASE_URL: http://mock-provider:8090
      GATEWAY_AI_SAFETY_SIDECAR_ENABLED: "${GATEWAY_AI_SAFETY_SIDECAR_ENABLED:-false}"
      GATEWAY_AI_SAFETY_SIDECAR_URL: ${GATEWAY_AI_SAFETY_SIDECAR_URL:-http://host.docker.internal:8001/internal/ai-safety/v1/detect}
      GATEWAY_AI_SAFETY_SIDECAR_TIMEOUT_MS: ${GATEWAY_AI_SAFETY_SIDECAR_TIMEOUT_MS:-750}
      GATEWAY_AI_SAFETY_SIDECAR_MODEL_ID: ${GATEWAY_AI_SAFETY_SIDECAR_MODEL_ID:-openai/privacy-filter}
      GATEWAY_AI_SAFETY_SIDECAR_DETECTOR_SET: ${GATEWAY_AI_SAFETY_SIDECAR_DETECTOR_SET:-privacy-filter-default}
      GATEWAY_AI_SAFETY_SIDECAR_LOCALE: ${GATEWAY_AI_SAFETY_SIDECAR_LOCALE:-ko-KR}
      GATEWAY_AI_SAFETY_SIDECAR_MODE: ${GATEWAY_AI_SAFETY_SIDECAR_MODE:-enforce}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TENANT_CHAT_PRIVATE_GATEWAY_ENABLED: "true"
      TENANT_CHAT_PRIVATE_LISTEN_ADDRESS: ":8081"
      TENANT_CHAT_WORKLOAD_JWKS_FILE: /run/secrets/tenant-chat/jwks.json
      TENANT_CHAT_BINDING_HMAC_KEYS_FILE: /run/secrets/tenant-chat/binding-hmac-keys.json
      TENANT_CHAT_CACHE_KEYSETS_FILE: /run/secrets/tenant-chat/cache-keysets.json
      TENANT_CHAT_USAGE_RECEIPT_TOKEN_FILE: /run/secrets/tenant-chat/usage-receipt-token
      TENANT_CHAT_RAG_ENABLED: ${TENANT_CHAT_RAG_ENABLED:-false}
      RAG_EMBEDDING_PROVIDER: ${RAG_EMBEDDING_PROVIDER:-openai}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-text-embedding-3-large}
      RAG_EMBEDDING_DIMENSIONS: "${RAG_EMBEDDING_DIMENSIONS:-1536}"
      RAG_EMBEDDING_PROFILE_VERSION: "${RAG_EMBEDDING_PROFILE_VERSION:-1}"
      RAG_DISTANCE_METRIC: ${RAG_DISTANCE_METRIC:-cosine}
      RAG_EMBEDDING_CREDENTIAL_REF_ID: ${RAG_EMBEDDING_CREDENTIAL_REF_ID:-credential_ref_openai_main}
      RAG_EMBEDDING_OPENAI_BASE_URL: ${RAG_EMBEDDING_OPENAI_BASE_URL:-https://api.openai.com/v1}
      RAG_EMBEDDING_WORKLOAD_JWKS_FILE: ${RAG_EMBEDDING_WORKLOAD_JWKS_FILE:-}
      RAG_EMBEDDING_BINDING_HMAC_KEYS_FILE: ${RAG_EMBEDDING_BINDING_HMAC_KEYS_FILE:-}
      RAG_EMBEDDING_WORKLOAD_IDENTITIES_FILE: ${RAG_EMBEDDING_WORKLOAD_IDENTITIES_FILE:-}
    expose:
      - "8081"
    secrets:
      - source: tenant_chat_workload_jwks
        target: /run/secrets/tenant-chat/jwks.json
      - source: tenant_chat_binding_hmac_keys
        target: /run/secrets/tenant-chat/binding-hmac-keys.json
      - source: tenant_chat_cache_keysets
        target: /run/secrets/tenant-chat/cache-keysets.json
      - source: tenant_chat_usage_receipt_token
        target: /run/secrets/tenant-chat/usage-receipt-token
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-provider:
        condition: service_healthy
      control-plane-api:
        condition: service_started

  chat-api:
    build:
      context: .
      dockerfile: infra/docker/chat-api.Dockerfile
    environment:
      NODE_ENV: development
      CHAT_API_PORT: "3003"
      DATABASE_URL: ${TENANT_CHAT_SMOKE_DATABASE_URL:-postgresql://gatelm:gatelm@postgres:5432/gatelm?schema=public}
      TENANT_CHAT_ACCESS_JWT_SECRET: ${TENANT_CHAT_ACCESS_JWT_SECRET:?TENANT_CHAT_ACCESS_JWT_SECRET is required}
      TENANT_CHAT_INTENT_SECRET: ${TENANT_CHAT_INTENT_SECRET:?TENANT_CHAT_INTENT_SECRET is required}
      TENANT_CHAT_WEB_SERVICE_TOKEN: ${TENANT_CHAT_WEB_SERVICE_TOKEN:?TENANT_CHAT_WEB_SERVICE_TOKEN is required}
      TENANT_CHAT_CONTROL_PLANE_BASE_URL: http://control-plane-api:3001
      TENANT_CHAT_CONTROL_PLANE_SERVICE_TOKEN: ${TENANT_CHAT_CONTROL_PLANE_SERVICE_TOKEN:?TENANT_CHAT_CONTROL_PLANE_SERVICE_TOKEN is required}
      TENANT_CHAT_GATEWAY_BASE_URL: http://gateway-core:8081
      TENANT_CHAT_RAG_ENABLED: ${TENANT_CHAT_RAG_ENABLED:-false}
      RAG_EMBEDDING_PROVIDER: ${RAG_EMBEDDING_PROVIDER:-openai}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-text-embedding-3-large}
      RAG_EMBEDDING_DIMENSIONS: "${RAG_EMBEDDING_DIMENSIONS:-1536}"
      RAG_EMBEDDING_PROFILE_VERSION: "${RAG_EMBEDDING_PROFILE_VERSION:-1}"
      RAG_DISTANCE_METRIC: ${RAG_DISTANCE_METRIC:-cosine}
      TENANT_CHAT_WORKLOAD_ACTIVE_KID: ${TENANT_CHAT_WORKLOAD_ACTIVE_KID:-tenant-chat-local-1}
      TENANT_CHAT_WORKLOAD_SIGNING_JWK_FILE: /run/secrets/tenant-chat/signing.jwk.json
      TENANT_CHAT_BINDING_HMAC_KEYS_FILE: /run/secrets/tenant-chat/binding-hmac-keys.json
      TENANT_CHAT_CONTENT_KEYS_FILE: /run/secrets/tenant-chat/content-keys.json
      TENANT_CHAT_HISTORY_RETENTION_DAYS: ${TENANT_CHAT_HISTORY_RETENTION_DAYS:-30}
      TENANT_CHAT_RETENTION_BATCH_SIZE: ${TENANT_CHAT_RETENTION_BATCH_SIZE:-50}
      TENANT_CHAT_RETENTION_INTERVAL_MS: ${TENANT_CHAT_RETENTION_INTERVAL_MS:-60000}
      TENANT_CHAT_ASSISTANT_MAX_BYTES: ${TENANT_CHAT_ASSISTANT_MAX_BYTES:-1048576}
      TENANT_CHAT_MAX_ATTACHMENTS_PER_TURN: ${TENANT_CHAT_MAX_ATTACHMENTS_PER_TURN:-4}
    secrets:
      - source: tenant_chat_workload_signing_jwk
        target: /run/secrets/tenant-chat/signing.jwk.json
      - source: tenant_chat_binding_hmac_keys
        target: /run/secrets/tenant-chat/binding-hmac-keys.json
      - source: tenant_chat_content_keys
        target: /run/secrets/tenant-chat/content-keys.json
    depends_on:
      postgres:
        condition: service_healthy
      control-plane-api:
        condition: service_started
      gateway-core:
        condition: service_started

  chat-web:
    build:
      context: .
      dockerfile: infra/docker/chat-web.Dockerfile
    environment:
      NODE_ENV: production
      GATELM_CHAT_WEB_ORIGIN: http://chat.localhost:3002
      TENANT_CHAT_API_BASE_URL: http://chat-api:3003
      TENANT_CHAT_WEB_SERVICE_TOKEN: ${TENANT_CHAT_WEB_SERVICE_TOKEN:?TENANT_CHAT_WEB_SERVICE_TOKEN is required}
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      chat-api:
        condition: service_started

secrets:
  tenant_chat_workload_signing_jwk:
    file: ${GATELM_TENANT_CHAT_LOCAL_SECRET_DIR:-.secrets/tenant-chat}/signing.jwk.json
  tenant_chat_workload_jwks:
    file: ${GATELM_TENANT_CHAT_LOCAL_SECRET_DIR:-.secrets/tenant-chat}/jwks.json
  tenant_chat_binding_hmac_keys:
    file: ${GATELM_TENANT_CHAT_LOCAL_SECRET_DIR:-.secrets/tenant-chat}/binding-hmac-keys.json
  tenant_chat_cache_keysets:
    file: ${GATELM_TENANT_CHAT_LOCAL_SECRET_DIR:-.secrets/tenant-chat}/cache-keysets.json
  tenant_chat_content_keys:
    file: ${GATELM_TENANT_CHAT_LOCAL_SECRET_DIR:-.secrets/tenant-chat}/content-keys.json
  tenant_chat_usage_receipt_token:
    file: ${GATELM_TENANT_CHAT_LOCAL_SECRET_DIR:-.secrets/tenant-chat}/usage-receipt-token
