services:
  control-plane-api:
    environment:
      AUTH_EMAIL_TRANSPORT: smtp
      CONTROL_PLANE_AUTH_DEV_AUTO_VERIFY: "false"
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      SMTP_TLS_MODE: disabled
      SMTP_FROM: "GateLM Local <no-reply@gatelm.local>"
    ports:
      - "127.0.0.1:3001:3001"

  mailpit:
    image: axllent/mailpit
    ports:
      - "127.0.0.1:8025:8025"
    expose:
      - "1025"
